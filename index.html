<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>北一二C 即時回報</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F4F6FA;color:#1A2332;font-family:-apple-system,'Helvetica Neue','PingFang TC',sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:1;}
input,select,textarea{color:#1A2332!important;background:#fff!important;}
input::placeholder,textarea::placeholder{color:#B0BCC8;}
select option{background:#fff;color:#1A2332;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashRed{0%{box-shadow:0 0 0 0 rgba(208,40,60,.3)}70%{box-shadow:0 0 0 8px rgba(208,40,60,0)}100%{box-shadow:none}}
@keyframes flashGreen{0%{box-shadow:0 0 0 0 rgba(0,144,74,.3)}70%{box-shadow:0 0 0 8px rgba(0,144,74,0)}100%{box-shadow:none}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F0F2F7;}
::-webkit-scrollbar-thumb{background:#C8D4E0;border-radius:3px;}
.card{background:#fff;border:1px solid #D8E2EE;border-radius:10px;box-shadow:0 1px 4px rgba(26,35,50,.06);}
.gold-top{height:3px;background:linear-gradient(90deg,#C8A020,#E8D060,#C8A020);}
.tab-btn{padding:8px 20px;border:none;border-bottom:3px solid transparent;background:transparent;color:#5A7090;font-weight:500;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn.active{border-bottom-color:#C8A020;color:#1A2332;font-weight:700;}
.flash-rise{animation:flashRed .5s ease;}
.flash-fall{animation:flashGreen .5s ease;}
.qixie-block{animation:slideDown .3s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API_URL = "https://north12c-report.n12c.workers.dev";

const C={
  bg:"#F4F6FA",card:"#fff",cardAlt:"#F8FAFD",
  border:"#D8E2EE",borderGold:"#C8A020",
  header:"#fff",
  accent:"#1A5FA8",accentLight:"#E8F0FA",
  gold:"#C8A020",goldLight:"#FDF8E8",
  textPri:"#1A2332",textSec:"#5A7090",textDim:"#B0BCC8",
  rise:"#D0283C",riseBg:"#FEF2F4",riseBdr:"#F0A0A8",
  fall:"#00904A",fallBg:"#F0FBF5",fallBdr:"#80D4A8",
  warn:"#C07000",warnBg:"#FDF5E0",warnBdr:"#E8C060",
  praise:"#1A5FA8",praiseBg:"#E8F0FA",
};

const STORES={
  medium:["台北忠孝東","台北新站前","台北天母"],
  small:["台北南京東","台北東區","台北公館","士林夜市","天母德行東","台北後山埤"],
};
const ALL_STORES=[...STORES.medium,...STORES.small];
const isMedium=s=>STORES.medium.includes(s);

const TARGETS={
  AQ999:{medium:2,small:1},AQ1399:{medium:2,small:1},
  RT999:{medium:6,small:5},RT1399:{medium:4,small:3},
  tewei:{medium:4,small:3},
  accessory:{medium:6000,small:4500},film:{medium:2800,small:1800},
};
const getTarget=(key,store)=>{const t=TARGETS[key];if(!t)return null;return isMedium(store)?t.medium:t.small;};
const meetsTarget=(key,val,store)=>{
  const t=getTarget(key,store);
  if(t===null||val===""||val===undefined)return null;
  const n=parseFloat(val);if(isNaN(n))return null;return n>=t;
};

const KPI_ITEMS=[
  {key:"AQ999",      label:"AQ999",        unit:"件",group:"AQ",hasTarget:true},
  {key:"AQ1399",     label:"AQ1399",       unit:"件",group:"AQ",hasTarget:true},
  {key:"RT999",      label:"RT999",        unit:"件",group:"RT",hasTarget:true},
  {key:"RT1399",     label:"RT1399",       unit:"件",group:"RT",hasTarget:true},
  {key:"upgrade",    label:"升轉件數",      unit:"件",group:"UP",hasTarget:false,praiseGt:2},
  {key:"downgrade",  label:"降轉件數",      unit:"件",group:"UP",hasTarget:false,warnGt:2},
  {key:"broadband",  label:"寬頻",          unit:"件",group:"OT",hasTarget:false},
  {key:"tewei",      label:"特維",          unit:"件",group:"OT",hasTarget:true},
  {key:"accessory",  label:"配件",          unit:"元",group:"OT",hasTarget:true},
  {key:"film",       label:"包膜",          unit:"元",group:"OT",hasTarget:true},
  {key:"video_kkbox",label:"Video+KKBOX",  unit:"件",group:"OT",hasTarget:false},
  {key:"apple_service",label:"APPLE服務",  unit:"件",group:"OT",hasTarget:false},
  {key:"hbo",        label:"HBO",          unit:"件",group:"OT",hasTarget:false},
  {key:"nf_p",       label:"NF/P",         unit:"件",group:"OT",hasTarget:false},
];

const todayStr=()=>new Date().toISOString().slice(0,10);

// ── 請益列（6欄）─────────────────────────────────────────────
const emptyQixieRow=()=>({handler:"",cust_status:"",product:"",plan:"",key_point:"",summary:""});
const emptyForm=()=>({
  ...Object.fromEntries(KPI_ITEMS.map(i=>[i.key,""])),
  device_num:"",device_case:"",
  insurance_count:"",phone_sales:"",
  aq999_qixie:[emptyQixieRow()],
  rt1399_qixie:[emptyQixieRow()],
});

// ── 時間工具 ─────────────────────────────────────────────────
const getNowHHMM=()=>{const d=new Date();return d.getHours()*100+d.getMinutes();};
const isLocked=()=>getNowHHMM()>=2130;
const isPastDeadline=()=>getNowHHMM()>=2000;

// ── API ──────────────────────────────────────────────────────
async function apiGet(date){
  const r=await fetch(`${API_URL}/data?date=${date}`);
  if(!r.ok)throw new Error();return r.json();
}
async function apiPost(date,store,form){
  const r=await fetch(`${API_URL}/data`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date,store,form}),
  });
  if(!r.ok)throw new Error();return r.json();
}

const calcDev=f=>{const n=parseFloat(f.device_num)||0,c=parseFloat(f.device_case)||0,t=n+c;return{n,c,total:t>0?t:null,pct:t>0?(c/t*100):null};};
const calcIns=f=>{const i=parseFloat(f.insurance_count)||0,p=parseFloat(f.phone_sales)||0;return{i,p,pct:p>0?(i/p*100):null};};

// ── UI 元件 ──────────────────────────────────────────────────
function Spinner(){return<span style={{display:"inline-block",width:12,height:12,border:`2px solid ${C.accent}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle",marginRight:5}}/>;}
function UpBadge({met,size=13}){if(met===null)return<span style={{color:C.textDim,fontSize:size}}>─</span>;return met?<span style={{color:C.rise,fontSize:size,fontWeight:800}}>▲</span>:<span style={{color:C.fall,fontSize:size,fontWeight:800}}>▼</span>;}
function ThreshBadge({pct,size=13}){if(pct===null)return<span style={{color:C.textDim,fontSize:size}}>─</span>;return pct>=50?<span style={{color:C.fall,fontSize:size,fontWeight:800}}>✓</span>:<span style={{color:C.rise,fontSize:size,fontWeight:800}}>⚠</span>;}

const SI={width:"100%",padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:14,color:C.textPri,background:"#fff",outline:"none",fontFamily:"inherit"};
const TH={padding:"8px 10px",background:"#F0F4FA",color:C.textSec,fontWeight:600,fontSize:11,textAlign:"center",border:`1px solid ${C.border}`,whiteSpace:"nowrap"};
const TD={padding:"7px 10px",border:`1px solid ${C.border}`,fontSize:12,color:C.textPri,verticalAlign:"middle"};

// ── 請益明細區塊 ─────────────────────────────────────────────
function QixieBlock({label,color,items,onChangeRow,onAddRow,onRemoveRow}){
  return(
    <div className="qixie-block" style={{border:`2px solid ${color}44`,borderRadius:10,padding:"14px",background:`${color}05`,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color}}>
          📋 {label} 請益明細
          <span style={{fontSize:10,fontWeight:400,color:C.textSec,marginLeft:8}}>共 {items.length} 筆</span>
        </div>
        <button onClick={onAddRow} style={{background:color,color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>＋ 新增列</button>
      </div>
      {items.map((row,i)=>(
        <div key={i} style={{background:"#fff",border:`1px solid ${color}33`,borderRadius:8,padding:"12px",marginBottom:8,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color,background:`${color}15`,borderRadius:4,padding:"2px 8px"}}>第 {i+1} 筆</span>
            {items.length>1&&<button onClick={()=>onRemoveRow(i)} style={{background:"transparent",border:`1px solid ${C.riseBdr}`,color:C.rise,borderRadius:4,padding:"2px 8px",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✕ 刪除</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            {[["承辦人","handler","填承辦人姓名"],["客戶狀況","cust_status","描述客戶背景/需求"],["成交商品","product","填商品名稱"]].map(([lbl,k,ph])=>(
              <div key={k}>
                <div style={{fontSize:10,color:C.textSec,marginBottom:3,fontWeight:600}}>{lbl}</div>
                <input placeholder={ph} value={row[k]||""} onChange={e=>onChangeRow(i,k,e.target.value)} style={{...SI,fontSize:12}}/>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            {[["成交方案","plan","填成交方案"],["締結關鍵","key_point","描述成交關鍵話術"]].map(([lbl,k,ph])=>(
              <div key={k}>
                <div style={{fontSize:10,color:C.textSec,marginBottom:3,fontWeight:600}}>{lbl}</div>
                <input placeholder={ph} value={row[k]||""} onChange={e=>onChangeRow(i,k,e.target.value)} style={{...SI,fontSize:12}}/>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:10,color:C.textSec,marginBottom:3,fontWeight:600}}>總結</div>
            <textarea placeholder="填寫整體心得與總結..." value={row.summary||""} onChange={e=>onChangeRow(i,"summary",e.target.value)} rows={2} style={{...SI,fontSize:12,resize:"vertical",lineHeight:1.5}}/>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── KPI 輸入卡 ────────────────────────────────────────────────
function KpiCard({item,value,store,onChange}){
  const met=item.hasTarget?meetsTarget(item.key,value,store):null;
  const target=getTarget(item.key,store);
  const n=parseFloat(value)||0;
  const isPraise=item.praiseGt!==undefined&&value!==""&&n>item.praiseGt;
  const isWarn  =item.warnGt  !==undefined&&value!==""&&n>item.warnGt;
  const bdrCol=met===null?(isPraise?`${C.praise}44`:isWarn?C.warnBdr:C.border):met?C.riseBdr:C.fallBdr;
  const bgCol =met===null?(isPraise?C.praiseBg:isWarn?C.warnBg:C.card):met?C.riseBg:C.fallBg;
  const numCol=met===null?(isPraise?C.praise:isWarn?C.warn:C.accent):met?C.rise:C.fall;
  const flashCls=met===null?"":met?"flash-rise":"flash-fall";
  return(
    <div className={flashCls} style={{background:bgCol,border:`1px solid ${bdrCol}`,borderRadius:8,padding:"10px 12px",transition:"background .3s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:600,color:C.textSec}}>{item.label}</span>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {target!==null&&<span style={{fontSize:9,color:C.textDim}}>目標{target}{item.unit}</span>}
          {item.hasTarget&&met!==null&&<UpBadge met={met} size={12}/>}
          {isPraise&&<span style={{fontSize:12}}>👍</span>}
          {isWarn&&<span style={{fontSize:11,color:C.warn,fontWeight:700}}>⚠ 注意</span>}
        </div>
      </div>
      <input type="number" min={0} placeholder="0" value={value} onChange={e=>onChange(e.target.value)}
        style={{...SI,fontSize:20,fontWeight:800,color:numCol,borderColor:bdrCol,background:"transparent"}}/>
      {item.unit&&<div style={{fontSize:9,color:C.textDim,marginTop:2,textAlign:"right"}}>{item.unit}</div>}
      {item.hasTarget&&target&&<div style={{height:3,background:"#EDF0F5",borderRadius:2,marginTop:5,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:2,background:met?C.rise:C.accent,width:`${Math.min((parseFloat(value)||0)/target*100,100)}%`,transition:"width .5s"}}/>
      </div>}
    </div>
  );
}

// ══ App ══════════════════════════════════════════════════════
function App(){
  const{useState,useEffect,useCallback,useRef}=React;
  const[view,   setView]   =useState("input");
  const[store,  setStore]  =useState("");
  const[date,   setDate]   =useState(todayStr());
  const[form,   setForm]   =useState(emptyForm());
  const[allData,setAllData]=useState({});
  const[saving, setSaving] =useState(false);
  const[saved,  setSaved]  =useState(false);
  const[net,    setNet]    =useState("ok");
  const[sumDate,setSumDate]=useState(todayStr());
  const[now,    setNow]    =useState("");
  const[sync,   setSync]   =useState("");
  const[locked, setLocked] =useState(isLocked());
  const[animate,setAnimate]=useState(false);

  useEffect(()=>{
    const t=()=>{
      setNow(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}));
      setLocked(isLocked());
    };
    t();const id=setInterval(t,1000);return()=>clearInterval(id);
  },[]);

  const load=useCallback(async d=>{
    setNet("loading");
    try{const data=await apiGet(d);setAllData(p=>({...p,[d]:data}));setSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}));setNet("ok");setAnimate(true);setTimeout(()=>setAnimate(false),1200);}
    catch{setNet("error");}
  },[]);

  useEffect(()=>{load(date);},[date]);
  useEffect(()=>{if(sumDate!==date)load(sumDate);},[sumDate]);
  useEffect(()=>{const id=setInterval(()=>{load(date);if(sumDate!==date)load(sumDate);},60000);return()=>clearInterval(id);},[date,sumDate]);

  useEffect(()=>{
    if(store&&date){
      const ex=allData?.[date]?.[store];
      setForm(ex?{...emptyForm(),...ex,
        aq999_qixie:ex.aq999_qixie&&ex.aq999_qixie.length>0?ex.aq999_qixie:[emptyQixieRow()],
        rt1399_qixie:ex.rt1399_qixie&&ex.rt1399_qixie.length>0?ex.rt1399_qixie:[emptyQixieRow()],
      }:emptyForm());
      setSaved(false);
    }
  },[store,date,allData]);

  const setF=k=>v=>{setForm(p=>({...p,[k]:v}));setSaved(false);};
  const addQixieRow=key=>{setForm(p=>({...p,[key]:[...(p[key]||[]),emptyQixieRow()]}));setSaved(false);};
  const removeQixieRow=(key,idx)=>{const next=(form[key]||[]).filter((_,i)=>i!==idx);setForm(p=>({...p,[key]:next.length?next:[emptyQixieRow()]}));setSaved(false);};
  const updateQixie=(key,idx,field,val)=>{const next=[...(form[key]||[])];next[idx]={...next[idx],[field]:val};setForm(p=>({...p,[key]:next}));setSaved(false);};

  // 請益觸發：有值（含0）就展開
  const needAQ999Qixie=form.AQ999!=="";
  const needRT1399Qixie=form.RT1399!=="";

  const save=async()=>{
    if(!store||saving)return;
    if(locked){alert("⛔ 已超過 21:30 鎖檔時間，無法儲存");return;}
    // 20:00 後必填驗證
    if(isPastDeadline()){
      const FIELDS=["handler","cust_status","product","plan","key_point","summary"];
      if(needAQ999Qixie){
        if((form.aq999_qixie||[]).some(q=>FIELDS.some(f=>!q[f]))){alert("⚠ 已超過 20:00，AQ999 請益明細須全部填妥才能儲存");return;}
      }
      if(needRT1399Qixie){
        if((form.rt1399_qixie||[]).some(q=>FIELDS.some(f=>!q[f]))){alert("⚠ 已超過 20:00，RT1399 請益明細須全部填妥才能儲存");return;}
      }
    }
    setSaving(true);setNet("loading");
    try{await apiPost(date,store,form);setAllData(p=>({...p,[date]:{...(p[date]||{}),[store]:{...form}}}));await load(date);setSaved(true);setNet("ok");setSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}));}
    catch{setNet("error");alert("儲存失敗，請確認網路連線");}
    finally{setSaving(false);}
  };

  const dev=calcDev(form);
  const ins=calcIns(form);
  const sumEnt=allData?.[sumDate]||{};
  const filled=ALL_STORES.filter(s=>sumEnt[s]);
  const missing=ALL_STORES.filter(s=>!sumEnt[s]);
  const sumItem=key=>{let t=0,h=false;ALL_STORES.forEach(s=>{const v=sumEnt[s]?.[key];if(v!==""&&v!==undefined){const n=parseFloat(v);if(!isNaN(n)){t+=n;h=true;}}});return h?t:null;};
  const filledN=Object.keys(allData?.[date]||{}).length;
  const netCol=net==="ok"?C.fall:net==="loading"?C.warn:C.rise;
  const netTxt=net==="ok"?"● 連線正常":net==="loading"?"● 同步中":"● 連線異常";
  const tickerBase=ALL_STORES.map(s=>`${!!allData?.[date]?.[s]?"▲":"▼"} ${s}（${isMedium(s)?"中":"小"}）`).join("  ·  ")+"  ·  已回填 "+filledN+"/9  ·  ";

  const SecLabel=({label,color})=>(
    <div style={{fontSize:11,color:C.textSec,fontWeight:600,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
      <span style={{width:3,height:14,background:color||C.accent,display:"inline-block",borderRadius:2}}/>
      {label}
    </div>
  );

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:48}}>

      {/* HEADER */}
      <div style={{background:C.header,borderBottom:`1px solid ${C.border}`,boxShadow:"0 1px 4px rgba(26,35,50,.08)"}}>
        <div className="gold-top"/>
        <div style={{maxWidth:900,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div>
              <div style={{fontSize:10,color:C.textSec,letterSpacing:1,marginBottom:1}}>台灣大哥大 · 北一二C管理區</div>
              <div style={{fontSize:22,fontWeight:800,color:C.textPri}}>
                即時回報
                <span style={{fontSize:12,fontWeight:400,color:C.gold,marginLeft:8,borderLeft:`1px solid ${C.border}`,paddingLeft:8}}>LIVE DASHBOARD</span>
              </div>
            </div>
            <div style={{display:"flex",gap:18,alignItems:"center",paddingLeft:16,borderLeft:`1px solid ${C.border}`}}>
              <div><div style={{fontSize:9,color:C.textSec,marginBottom:1}}>狀態</div><div style={{fontSize:11,color:netCol,fontWeight:700}}>{netTxt}</div></div>
              <div><div style={{fontSize:9,color:C.textSec,marginBottom:1}}>時間</div><div style={{fontSize:14,color:locked?C.rise:C.accent,fontWeight:700,letterSpacing:1}}>{now}{locked?" 🔒":""}</div></div>
              <div><div style={{fontSize:9,color:C.textSec,marginBottom:1}}>回填</div><div style={{fontSize:16,fontWeight:800,color:filledN===9?C.fall:C.warn}}>{filledN}<span style={{fontSize:10,color:C.textSec,fontWeight:400}}>/9</span></div></div>
              {sync&&<div><div style={{fontSize:9,color:C.textSec,marginBottom:1}}>同步</div><div style={{fontSize:11,color:C.textSec}}>{sync}</div></div>}
            </div>
          </div>
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
            <button className={`tab-btn${view==="input"?" active":""}`} onClick={()=>setView("input")}>📝 填寫回報</button>
            <button className={`tab-btn${view==="summary"?" active":""}`} onClick={()=>setView("summary")}>📊 當日彙整</button>
          </div>
        </div>
      </div>

      {/* TICKER */}
      <div style={{background:"#EEF2F8",borderBottom:`1px solid ${C.border}`,padding:"4px 0",overflow:"hidden",whiteSpace:"nowrap"}}>
        <span style={{display:"inline-block",animation:"ticker 32s linear infinite",fontSize:11,color:C.textSec}}>{tickerBase+tickerBase}</span>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 14px 0"}}>

        {/* ══ 填寫回報 ══ */}
        {view==="input"&&<>
          {/* 選擇欄 */}
          <div className="card" style={{padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{flex:"0 0 150px"}}>
                <div style={{fontSize:11,color:C.textSec,marginBottom:4,fontWeight:500}}>日期</div>

                      </td>;})}
                      <td style={{...TD,textAlign:"center",borderLeft:`2px solid ${C.gold}44`,background:tOk===null?C.card:tOk?C.fallBg:C.riseBg}}>
                        {tPct!==null?<><div style={{fontSize:10,color:C.textSec}}>搭:{tI} / 機:{tP}</div><div style={{fontWeight:700,fontSize:13,color:tOk?C.fall:C.rise}}>{tPct.toFixed(1)}% <ThreshBadge pct={tPct} size={11}/></div></>:"—"}
                      </td>
                    </tr>;})()}
                  </tbody>
                </table>
              </div>
            </div>

            {/* 請益明細彙整表 */}
            {["aq999_qixie","rt1399_qixie"].map((qKey,qi)=>{
              const label=qi===0?"AQ999":"RT1399";
              const color=qi===0?C.rise:C.warn;
              const rows=filled.flatMap(s=>(sumEnt[s]?.[qKey]||[]).filter(q=>q.handler||q.product).map(q=>({store:s,...q})));
              if(!rows.length)return null;
              return<div key={qKey} className="card" style={{overflow:"hidden",marginBottom:10}}>
                <div style={{padding:"8px 14px",borderBottom:`2px solid ${color}44`,background:`${color}06`,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12,fontWeight:700,color}}>📋 {label} 請益明細彙整</span>
                  <span style={{fontSize:10,color:C.textSec}}>（{rows.length} 筆）</span>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr>{["門市","承辦人","客戶狀況","成交商品","成交方案","締結關鍵","總結"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                    <tbody>{rows.map((r,i)=><tr key={i} style={{background:i%2===0?C.card:C.cardAlt}}>
                      <td style={{...TD,fontWeight:600,color}}>{r.store}</td>
                      <td style={TD}>{r.handler||"—"}</td>
                      <td style={TD}>{r.cust_status||"—"}</td>
                      <td style={TD}>{r.product||"—"}</td>
                      <td style={TD}>{r.plan||"—"}</td>
                      <td style={TD}>{r.key_point||"—"}</td>
                      <td style={TD}>{r.summary||"—"}</td>
                    </tr>)}</tbody>
                  </table>
                </div>
              </div>;
            })}
          </>}
          {filled.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:C.textDim,fontSize:13}}>{sumDate} 尚無回填資料</div>}
        </>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
