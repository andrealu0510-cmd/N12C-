<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>北一二C 即時回報</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F4F6FA;color:#1A2332;font-family:-apple-system,'Helvetica Neue','PingFang TC',sans-serif;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;}
input,select{color:#1A2332!important;background:#fff!important;}
input::placeholder{color:#B0BCC8;}
select option{background:#fff;color:#1A2332;}

@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashGreen{0%{box-shadow:0 0 0 0 rgba(0,160,80,0.4)}70%{box-shadow:0 0 0 8px rgba(0,160,80,0)}100%{box-shadow:none}}
@keyframes flashRed{0%{box-shadow:0 0 0 0 rgba(210,40,60,0.35)}70%{box-shadow:0 0 0 8px rgba(210,40,60,0)}100%{box-shadow:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F0F2F7;}
::-webkit-scrollbar-thumb{background:#C8D4E0;border-radius:3px;}

.card{background:#fff;border:1px solid #D8E2EE;border-radius:10px;box-shadow:0 1px 4px rgba(26,35,50,0.06);}
.card-header{padding:10px 16px;border-bottom:2px solid #E8C84A;display:flex;justify-content:space-between;align-items:center;}
.gold-bar{height:3px;background:linear-gradient(90deg,#C8A020,#E8D060,#C8A020);border-radius:0 0 2px 2px;}
.tab-active{border-bottom:3px solid #C8A020!important;color:#1A2332!important;font-weight:700!important;}
.progress-dot{width:8px;height:8px;border-radius:50%;display:inline-block;transition:background .3s;}
.num-animate{animation:countUp .25s ease;}
.row-flash-rise{animation:flashRed .6s ease;}
.row-flash-fall{animation:flashGreen .6s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API_URL = "https://north12c-report.n12c.workers.dev";

const C = {
  bg:"#F4F6FA", card:"#fff", cardAlt:"#F8FAFD",
  border:"#D8E2EE", borderGold:"#C8A020", borderStrong:"#B0C0D4",
  header:"#fff",
  accent:"#1A5FA8",   // 金融藍
  accentLight:"#E8F0FA",
  gold:"#C8A020",     // 金融金
  goldLight:"#FDF8E8",
  textPri:"#1A2332",  textSec:"#5A7090",  textDim:"#B0BCC8",
  rise:"#D0283C",     // 台股紅 達標
  riseBg:"#FEF2F4",   riseBdr:"#F0A0A8",
  fall:"#00904A",     // 台股綠 未達標
  fallBg:"#F0FBF5",   fallBdr:"#80D4A8",
  warn:"#C07000",     warnBg:"#FDF5E0",   warnBdr:"#E8C060",
  neutral:"#6A8CA8",
};

const STORES={medium:["台北忠孝東","台北新站前","台北天母"],small:["台北南京東","台北東區","台北公館","士林夜市","天母德行東","台北後山埤"]};
const ALL_STORES=[...STORES.medium,...STORES.small];
const isMedium=s=>STORES.medium.includes(s);

const TARGETS={
  AQ999:{medium:2,small:1},AQ1399:{medium:2,small:1},
  RT999:{medium:6,small:5},RT1399:{medium:4,small:3},
  tewei:{medium:4,small:3},
  accessory:{medium:6000,small:4500},film:{medium:2800,small:1800},
};
const getTarget=(key,store)=>{const t=TARGETS[key];if(!t)return null;return isMedium(store)?t.medium:t.small;};
const meetsTarget=(key,val,store)=>{const t=getTarget(key,store);if(t===null||val===""||val===undefined)return null;const n=parseFloat(val);if(isNaN(n))return null;return n>=t;};

const ITEMS=[
  {key:"AQ999",      label:"AQ999",       unit:"件",hasTarget:true},
  {key:"AQ1399",     label:"AQ1399",      unit:"件",hasTarget:true},
  {key:"broadband",  label:"寬頻",         unit:"件",hasTarget:false},
  {key:"tewei",      label:"特維",         unit:"件",hasTarget:true},
  {key:"RT999",      label:"RT999",       unit:"件",hasTarget:true},
  {key:"RT1399",     label:"RT1399",      unit:"件",hasTarget:true},
  {key:"accessory",  label:"配件",         unit:"元",hasTarget:true},
  {key:"film",       label:"包膜",         unit:"元",hasTarget:true},
  {key:"video_kkbox",label:"Video+KKBOX", unit:"件",hasTarget:false},
  {key:"apple_service",label:"APPLE服務", unit:"件",hasTarget:false},
  {key:"hbo",        label:"HBO",         unit:"件",hasTarget:false},
  {key:"nf_p",       label:"NF/P",        unit:"件",hasTarget:false},
];

const todayStr=()=>new Date().toISOString().slice(0,10);
const emptyForm=()=>({...Object.fromEntries(ITEMS.map(i=>[i.key,""])),device_num:"",device_case:"",insurance_count:"",phone_sales:""});

async function apiGet(date){const r=await fetch(`${API_URL}/data?date=${date}`);if(!r.ok)throw new Error();return r.json();}
async function apiPost(date,store,form){const r=await fetch(`${API_URL}/data`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({date,store,form})});if(!r.ok)throw new Error();return r.json();}

const calcDev=f=>{const n=parseFloat(f.device_num)||0,c=parseFloat(f.device_case)||0,t=n+c;return{n,c,total:t>0?t:null,pct:t>0?(c/t*100):null};};
const calcIns=f=>{const i=parseFloat(f.insurance_count)||0,p=parseFloat(f.phone_sales)||0;return{i,p,pct:p>0?(i/p*100):null};};

// ── 數字滾動 Hook ────────────────────────────────────────────
function useCountUp(target, duration=600){
  const {useState,useEffect,useRef}=React;
  const [display,setDisplay]=useState(0);
  const prev=useRef(0);
  useEffect(()=>{
    const n=parseFloat(target);
    if(isNaN(n)){setDisplay(target);return;}
    const start=prev.current, end=n, diff=end-start;
    if(diff===0)return;
    const startTime=performance.now();
    const tick=now=>{
      const elapsed=now-startTime;
      const progress=Math.min(elapsed/duration,1);
      const ease=1-Math.pow(1-progress,3); // ease-out cubic
      const cur=Math.round(start+diff*ease);
      setDisplay(cur);
      if(progress<1)requestAnimationFrame(tick);
      else{setDisplay(end);prev.current=end;}
    };
    requestAnimationFrame(tick);
  },[target]);
  return display;
}

// ── Badge ─────────────────────────────────────────────────────
function UpBadge({met,size=13}){
  if(met===null)return <span style={{color:C.textDim,fontSize:size}}>─</span>;
  return met
    ?<span style={{color:C.rise,fontSize:size,fontWeight:800}}>▲</span>
    :<span style={{color:C.fall,fontSize:size,fontWeight:800}}>▼</span>;
}
function ThreshBadge({pct,size=13}){
  if(pct===null)return <span style={{color:C.textDim,fontSize:size}}>─</span>;
  return pct>=50
    ?<span style={{color:C.fall,fontSize:size,fontWeight:800}}>✓</span>
    :<span style={{color:C.rise,fontSize:size,fontWeight:800}}>⚠</span>;
}

// ── 進度條 ────────────────────────────────────────────────────
function ProgressBar({value,target,color}){
  if(!target||value===""||value===undefined)return null;
  const pct=Math.min((parseFloat(value)||0)/target*100,100);
  return(
    <div style={{height:4,background:"#EDF0F5",borderRadius:2,marginTop:5,overflow:"hidden"}}>
      <div style={{
        height:"100%",borderRadius:2,
        background:color||C.accent,
        width:`${pct}%`,
        transition:"width .6s cubic-bezier(.4,0,.2,1)",
      }}/>
    </div>
  );
}

// ── 數值輸入卡 ────────────────────────────────────────────────
function InputCard({item,value,store,onChange}){
  const met=item.hasTarget?meetsTarget(item.key,value,store):null;
  const target=getTarget(item.key,store);
  const displayed=useCountUp(value===""?0:value);

  const borderCol=met===null?C.border:met?C.riseBdr:C.fallBdr;
  const bgCol    =met===null?C.card  :met?C.riseBg :C.fallBg;
  const numCol   =met===null?C.accent:met?C.rise   :C.fall;
  const flashCls =met===null?"":met?"row-flash-rise":"row-flash-fall";

  return(
    <div className={flashCls} style={{background:bgCol,border:`1px solid ${borderCol}`,borderRadius:8,padding:"10px 12px",transition:"background .3s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:600,color:C.textSec,letterSpacing:.3}}>{item.label}</span>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          {target!==null&&<span style={{fontSize:10,color:C.textDim}}>目標 {target}{item.unit}</span>}
          {met!==null&&<UpBadge met={met} size={13}/>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <input type="number" min={0} placeholder="0" value={value}
          onChange={e=>onChange(e.target.value)}
          style={{
            width:"100%",padding:"7px 10px",
            border:`1px solid ${borderCol}`,borderRadius:6,
            fontSize:20,fontWeight:800,color:numCol,
            background:"transparent",outline:"none",fontFamily:"inherit",
          }}/>
      </div>
      {item.unit&&<div style={{fontSize:10,color:C.textDim,marginTop:3,textAlign:"right"}}>{item.unit}</div>}
      {item.hasTarget&&target&&<ProgressBar value={value} target={target} color={met?C.rise:C.accent}/>}
    </div>
  );
}

// ── 彙整表格 cell ──────────────────────────────────────────────
function SummaryNum({value,unit,met,animate}){
  const displayed=useCountUp(animate?(value||0):value,800);
  if(value===""||value===undefined)return<span style={{color:C.textDim}}>—</span>;
  return<span style={{fontWeight:700,fontSize:13,color:met===null?C.textPri:met?C.rise:C.fall}}>
    {animate?displayed:value}{unit} {met!==null&&<UpBadge met={met} size={11}/>}
  </span>;
}

// ── Spinner ───────────────────────────────────────────────────
function Spinner(){return<span style={{display:"inline-block",width:12,height:12,border:`2px solid ${C.accent}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle",marginRight:5}}/>;}

const SI_BASE={
  width:"100%",padding:"7px 10px",
  border:`1px solid ${C.border}`,borderRadius:6,
  fontSize:14,color:C.textPri,
  background:"#fff",outline:"none",fontFamily:"inherit",
};

const TH={padding:"8px 10px",background:"#F0F4FA",color:C.textSec,fontWeight:600,fontSize:11,textAlign:"center",border:`1px solid ${C.border}`,whiteSpace:"nowrap",letterSpacing:.3};
const TD={padding:"8px 10px",border:`1px solid ${C.border}`,fontSize:12,color:C.textPri,verticalAlign:"middle"};

// ── App ───────────────────────────────────────────────────────
function App(){
  const{useState,useEffect,useCallback}=React;
  const[view,   setView]   =useState("input");
  const[store,  setStore]  =useState("");
  const[date,   setDate]   =useState(todayStr());
  const[form,   setForm]   =useState(emptyForm());
  const[allData,setAllData]=useState({});
  const[saving, setSaving] =useState(false);
  const[saved,  setSaved]  =useState(false);
  const[net,    setNet]    =useState("ok");
  const[sumDate,setSumDate]=useState(todayStr());
  const[now,    setNow]    =useState("");
  const[sync,   setSync]   =useState("");
  const[animate,setAnimate]=useState(false);

  useEffect(()=>{
    const t=()=>setNow(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}));
    t();const id=setInterval(t,1000);return()=>clearInterval(id);
  },[]);

  const load=useCallback(async d=>{
    setNet("loading");
    try{
      const data=await apiGet(d);
      setAllData(p=>({...p,[d]:data}));
      setSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}));
      setNet("ok");
      setAnimate(true);
      setTimeout(()=>setAnimate(false),1200);
    }catch{setNet("error");}
  },[]);

  useEffect(()=>{load(date);},[date]);
  useEffect(()=>{if(sumDate!==date)load(sumDate);},[sumDate]);
  useEffect(()=>{const id=setInterval(()=>{load(date);if(sumDate!==date)load(sumDate);},60000);return()=>clearInterval(id);},[date,sumDate]);
  useEffect(()=>{
    if(store&&date){const ex=allData?.[date]?.[store];setForm(ex?{...emptyForm(),...ex}:emptyForm());setSaved(false);}
  },[store,date,allData]);

  const save=async()=>{
    if(!store||saving)return;
    setSaving(true);setNet("loading");
    try{await apiPost(date,store,form);setAllData(p=>({...p,[date]:{...(p[date]||{}),[store]:{...form}}}));setSaved(true);setNet("ok");setSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}));}
    catch{setNet("error");alert("儲存失敗，請確認網路連線");}
    finally{setSaving(false);}
  };

  const sumEnt=allData?.[sumDate]||{};
  const filled=ALL_STORES.filter(s=>sumEnt[s]);
  const missing=ALL_STORES.filter(s=>!sumEnt[s]);
  const sumItem=key=>{let t=0,h=false;ALL_STORES.forEach(s=>{const v=sumEnt[s]?.[key];if(v!==""&&v!==undefined){const n=parseFloat(v);if(!isNaN(n)){t+=n;h=true;}}});return h?t:null;};
  const filledN=Object.keys(allData?.[date]||{}).length;
  const dev=calcDev(form);
  const ins=calcIns(form);

  const tickerBase=ALL_STORES.map(s=>`${!!allData?.[date]?.[s]?"▲":"▼"} ${s}（${isMedium(s)?"中":"小"}）`).join("  ·  ")+"  ·  已回填 "+filledN+"/9  ·  ";

  const netCol=net==="ok"?C.fall:net==="loading"?C.warn:C.rise;
  const netTxt=net==="ok"?"● 連線正常":net==="loading"?"● 同步中":"● 連線異常";

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:48}}>

      {/* ══ HEADER ══ */}
      <div style={{background:C.header,borderBottom:`1px solid ${C.border}`,boxShadow:"0 1px 4px rgba(26,35,50,0.08)"}}>
        <div className="gold-bar"/>
        <div style={{maxWidth:880,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          {/* Logo */}
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div>
              <div style={{fontSize:10,color:C.textSec,letterSpacing:1,marginBottom:1}}>台灣大哥大 · 北一二C管理區</div>
              <div style={{fontSize:22,fontWeight:800,color:C.textPri,letterSpacing:.3}}>
                即時回報
                <span style={{fontSize:12,fontWeight:400,color:C.gold,marginLeft:8,letterSpacing:1,borderLeft:`1px solid ${C.border}`,paddingLeft:8}}>LIVE DASHBOARD</span>
              </div>
            </div>
            {/* 狀態列 */}
            <div style={{display:"flex",gap:20,alignItems:"center",paddingLeft:16,borderLeft:`1px solid ${C.border}`}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C.textSec,marginBottom:2}}>狀態</div>
                <div style={{fontSize:11,color:netCol,fontWeight:700}}>{netTxt}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C.textSec,marginBottom:2}}>時間</div>
                <div style={{fontSize:14,color:C.accent,fontWeight:700,letterSpacing:1}}>{now}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C.textSec,marginBottom:2}}>回填</div>
                <div style={{fontSize:16,fontWeight:800,color:filledN===9?C.fall:C.gold}}>{filledN}<span style={{fontSize:10,color:C.textSec,fontWeight:400}}>/9</span></div>
              </div>
              {sync&&<div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:C.textSec,marginBottom:2}}>同步</div>
                <div style={{fontSize:11,color:C.textSec}}>{sync}</div>
              </div>}
            </div>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
            {[["input","📝 回填"],["summary","📊 彙整"]].map(([v,lbl])=>(
              <button key={v} onClick={()=>setView(v)} className={view===v?"tab-active":""} style={{
                padding:"8px 20px",border:"none",borderBottom:`3px solid transparent`,
                background:"transparent",color:C.textSec,fontWeight:500,fontSize:13,
                cursor:"pointer",fontFamily:"inherit",letterSpacing:.3,
              }}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ══ TICKER ══ */}
      <div style={{background:"#EEF2F8",borderBottom:`1px solid ${C.border}`,padding:"4px 0",overflow:"hidden",whiteSpace:"nowrap"}}>
        <span style={{display:"inline-block",animation:"ticker 32s linear infinite",fontSize:11,color:C.textSec}}>
          {tickerBase+tickerBase}
        </span>
      </div>

      <div style={{maxWidth:880,margin:"0 auto",padding:"14px 14px 0"}}>

        {/* ══ INPUT VIEW ══ */}
        {view==="input"&&<>
          {/* 選擇欄 */}
          <div className="card" style={{padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{flex:"0 0 150px"}}>
                <div style={{fontSize:11,color:C.textSec,marginBottom:4,fontWeight:500}}>日期</div>
                <input type="date" value={date} onChange={e=>{setDate(e.target.value);setSaved(false);}} style={SI_BASE}/>
              </div>
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontSize:11,color:C.textSec,marginBottom:4,fontWeight:500}}>店別</div>
                <select value={store} onChange={e=>setStore(e.target.value)} style={SI_BASE}>
                  <option value="">── 請選擇 ──</option>
                  <optgroup label="中型店">{STORES.medium.map(s=><option key={s} value={s}>{s}</option>)}</optgroup>
                  <optgroup label="小型店">{STORES.small.map(s=><option key={s} value={s}>{s}</option>)}</optgroup>
                </select>
              </div>
              {store&&<div style={{padding:"8px 14px",border:`1px solid ${isMedium(store)?C.accent+"44":"#00904A44"}`,borderRadius:8,background:isMedium(store)?C.accentLight:C.fallBg,fontSize:12,animation:"slideIn .25s ease"}}>
                <span style={{color:isMedium(store)?C.accent:C.fall,fontWeight:700}}>{isMedium(store)?"中型店":"小型店"}</span>
                <span style={{color:C.textPri,marginLeft:8,fontWeight:600}}>{store}</span>
                <span style={{color:allData?.[date]?.[store]?C.fall:C.textSec,marginLeft:10,fontSize:11}}>
                  {allData?.[date]?.[store]?"▲ 已回填":"○ 待填"}
                </span>
              </div>}
            </div>
          </div>

          {/* 進度列 */}
          <div className="card" style={{marginBottom:10,overflow:"hidden"}}>
            <div className="card-header">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,fontWeight:600,color:C.textPri}}>今日回填進度</span>
                <div style={{display:"flex",gap:4}}>
                  {ALL_STORES.map(s=>(
                    <div key={s} className="progress-dot"
                      style={{background:allData?.[date]?.[s]?C.fall:C.border}}
                      title={s}/>
                  ))}
                </div>
                <span style={{fontSize:12,color:filledN===9?C.fall:C.warn,fontWeight:700}}>{filledN}/9</span>
              </div>
              <button onClick={()=>load(date)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textSec,borderRadius:5,fontSize:11,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                {net==="loading"?<Spinner/>:"↻"} 更新
              </button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap"}}>
              {ALL_STORES.map(s=>{
                const done=!!allData?.[date]?.[s],active=s===store;
                return<button key={s} onClick={()=>{setStore(s);window.scrollTo({top:0,behavior:"smooth"});}} style={{
                  flex:"1 1 33%",padding:"9px 12px",border:"none",
                  borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,
                  borderLeft:active?`3px solid ${C.gold}`:`3px solid transparent`,
                  background:active?"#FDFAF0":"transparent",cursor:"pointer",textAlign:"left",
                  transition:"background .15s",
                }}>
                  <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:done?C.fall:C.border,marginRight:6,verticalAlign:"middle",transition:"background .3s"}}/>
                  <span style={{fontSize:12,color:active?C.textPri:C.textSec,fontWeight:active?700:400}}>{s}</span>
                  <span style={{fontSize:10,color:C.textDim,marginLeft:4}}>{isMedium(s)?"中":"小"}</span>
                  {done&&<span style={{fontSize:11,color:C.fall,marginLeft:6,fontWeight:700}}>▲</span>}
                </button>;
              })}
            </div>
          </div>

          {/* 回填表單 */}
          {store&&<div className="card" style={{padding:"14px",marginBottom:10,animation:"fadeUp .3s ease"}}>
            <div className="card-header" style={{marginBottom:14,padding:"0 0 10px",border:"none",borderBottom:`1px solid ${C.border}`}}>
              <div>
                <span style={{fontSize:13,fontWeight:700,color:C.textPri}}>{store}</span>
                <span style={{fontSize:11,color:C.textSec,marginLeft:8}}>{isMedium(store)?"中型店":"小型店"} — 回填項目</span>
              </div>
              <div style={{fontSize:11,color:C.gold,fontWeight:600}}>{date}</div>
            </div>

            {/* 數字 2欄 */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {ITEMS.map(item=>(
                <InputCard key={item.key} item={item} value={form[item.key]} store={store}
                  onChange={v=>{setForm(p=>({...p,[item.key]:v}));setSaved(false);}}/>
              ))}
            </div>

            {/* 設備案 */}
            <div style={{border:`1px solid ${dev.pct!==null?dev.pct>=50?C.fallBdr:C.riseBdr:C.border}`,borderRadius:8,padding:"12px",marginBottom:8,background:dev.pct!==null?dev.pct>=50?C.fallBg:C.riseBg:C.cardAlt,transition:"background .4s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:C.textPri}}>設備案 / 門號案 / 總數 / 設備案佔比</span>
                <span style={{fontSize:10,color:C.textSec,background:"#EEF2F8",borderRadius:4,padding:"2px 7px"}}>低水位 &lt; 50%</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                {[["門號案","device_num"],["設備案","device_case"]].map(([lbl,k])=>(
                  <div key={k}>
                    <div style={{fontSize:10,color:C.textSec,marginBottom:4,fontWeight:500}}>{lbl}</div>
                    <input type="number" min={0} placeholder="0" value={form[k]}
                      onChange={e=>{setForm(p=>({...p,[k]:e.target.value}));setSaved(false);}}
                      style={{...SI_BASE,fontSize:18,fontWeight:700,color:C.accent}}/>
                  </div>
                ))}
                <div>
                  <div style={{fontSize:10,color:C.textSec,marginBottom:4,fontWeight:500}}>總數（自動）</div>
                  <div style={{...SI_BASE,fontSize:20,fontWeight:800,color:dev.total?C.gold:C.textDim,border:`1px solid ${C.border}`,background:"#FAFBFE",display:"flex",alignItems:"center"}}>
                    {dev.total!==null?dev.total:"—"}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.textSec,marginBottom:4,fontWeight:500}}>設備案佔比（自動）</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{...SI_BASE,flex:1,fontSize:18,fontWeight:800,textAlign:"center",
                      color:dev.pct===null?C.textDim:dev.pct>=50?C.fall:C.rise,
                      border:`1px solid ${dev.pct===null?C.border:dev.pct>=50?C.fallBdr:C.riseBdr}`,
                      background:dev.pct===null?"#FAFBFE":dev.pct>=50?C.fallBg:C.riseBg,
                    }}>
                      {dev.pct!==null?`${dev.pct.toFixed(1)}%`:"—"}
                    </div>
                    <ThreshBadge pct={dev.pct} size={20}/>
                  </div>
                  {dev.pct!==null&&<div style={{height:4,background:"#EDF0F5",borderRadius:2,marginTop:5,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,background:dev.pct>=50?C.fall:C.rise,width:`${Math.min(dev.pct,100)}%`,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
                  </div>}
                </div>
              </div>
              {dev.pct!==null&&dev.pct<50&&<div style={{marginTop:8,padding:"6px 10px",background:C.riseBg,border:`1px solid ${C.riseBdr}`,borderRadius:5,fontSize:11,color:C.rise,fontWeight:600}}>
                ⚠ 設備案佔比 {dev.pct.toFixed(1)}%，低於 50% 低水位，請即時調整
              </div>}
            </div>

            {/* 保險搭售率 */}
            <div style={{border:`1px solid ${ins.pct!==null?ins.pct>=50?C.fallBdr:C.riseBdr:C.border}`,borderRadius:8,padding:"12px",marginBottom:12,background:ins.pct!==null?ins.pct>=50?C.fallBg:C.riseBg:C.cardAlt,transition:"background .4s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:700,color:C.textPri}}>保險搭售率</span>
                <span style={{fontSize:10,color:C.textSec,background:"#EEF2F8",borderRadius:4,padding:"2px 7px"}}>目標 ≥ 50%</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,alignItems:"end"}}>
                {[["保險搭售數","insurance_count"],["手機設備案銷售數","phone_sales"]].map(([lbl,k])=>(
                  <div key={k}>
                    <div style={{fontSize:10,color:C.textSec,marginBottom:4,fontWeight:500}}>{lbl}</div>
                    <input type="number" min={0} placeholder="0" value={form[k]}
                      onChange={e=>{setForm(p=>({...p,[k]:e.target.value}));setSaved(false);}}
                      style={{...SI_BASE,fontSize:18,fontWeight:700,color:C.accent}}/>
                  </div>
                ))}
                <div>
                  <div style={{fontSize:10,color:C.textSec,marginBottom:4,fontWeight:500}}>搭售率（自動）</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{...SI_BASE,flex:1,fontSize:20,fontWeight:800,textAlign:"center",
                      color:ins.pct===null?C.textDim:ins.pct>=50?C.fall:C.rise,
                      border:`1px solid ${ins.pct===null?C.border:ins.pct>=50?C.fallBdr:C.riseBdr}`,
                      background:ins.pct===null?"#FAFBFE":ins.pct>=50?C.fallBg:C.riseBg,
                    }}>
                      {ins.pct!==null?`${ins.pct.toFixed(1)}%`:"—"}
                    </div>
                    <ThreshBadge pct={ins.pct} size={22}/>
                  </div>
                  {ins.pct!==null&&<div style={{height:4,background:"#EDF0F5",borderRadius:2,marginTop:5,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,background:ins.pct>=50?C.fall:C.rise,width:`${Math.min(ins.pct,100)}%`,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
                  </div>}
                </div>
              </div>
              {ins.pct!==null&&ins.pct<50&&<div style={{marginTop:8,padding:"6px 10px",background:C.riseBg,border:`1px solid ${C.riseBdr}`,borderRadius:5,fontSize:11,color:C.rise,fontWeight:600}}>
                ⚠ 保險搭售率 {ins.pct.toFixed(1)}%，低於 50%，請加強保險推薦
              </div>}
            </div>

            {/* 送出 */}
            <div style={{display:"flex",gap:8}}>
              <button onClick={save} disabled={saving} style={{
                flex:1,padding:"13px 0",
                background:saved?C.fallBg:C.accent,
                border:`2px solid ${saved?C.fallBdr:C.accent}`,
                color:saved?C.fall:"#fff",
                borderRadius:8,fontWeight:800,fontSize:14,
                cursor:saving?"not-allowed":"pointer",letterSpacing:.3,
                fontFamily:"inherit",transition:"all .2s",
                opacity:saving?.7:1,
                boxShadow:saved?"none":`0 2px 8px ${C.accent}44`,
              }}>
                {saving?<><Spinner/>儲存中...</>:saved?"▲ 已儲存":"儲存資料"}
              </button>
              <button onClick={()=>{setForm(emptyForm());setSaved(false);}} style={{
                padding:"13px 20px",background:"#fff",
                border:`1px solid ${C.border}`,color:C.textSec,
                borderRadius:8,fontSize:13,cursor:"pointer",fontFamily:"inherit",
              }}>清除</button>
            </div>
          </div>}
        </>}

        {/* ══ SUMMARY VIEW ══ */}
        {view==="summary"&&<>
          <div className="card" style={{padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11,color:C.textSec,marginBottom:4,fontWeight:500}}>彙整日期</div>
                <input type="date" value={sumDate} onChange={e=>setSumDate(e.target.value)} style={{...SI_BASE,width:160}}/>
              </div>
              <button onClick={()=>load(sumDate)} style={{background:"#fff",border:`1px solid ${C.border}`,color:C.textSec,borderRadius:6,fontSize:12,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",marginTop:16}}>
                {net==="loading"?<Spinner/>:"↻"} 更新
              </button>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:16}}>
                {filled.length>0&&<div style={{fontSize:11,border:`1px solid ${C.fallBdr}`,borderRadius:5,padding:"5px 12px",color:C.fall,fontWeight:600,background:C.fallBg}}>▲ 已回填 {filled.length} 家</div>}
                {missing.length>0&&<div style={{fontSize:11,border:`1px solid ${C.riseBdr}`,borderRadius:5,padding:"5px 12px",color:C.rise,background:C.riseBg}}>▼ 未回填：{missing.map(s=>`${s}(${isMedium(s)?"中":"小"})`).join("、")}</div>}
              </div>
            </div>
          </div>

          {filled.length>0&&<div className="card" style={{overflow:"hidden",marginBottom:10}}>
            <div className="card-header">
              <span style={{fontSize:12,fontWeight:700,color:C.textPri}}>各店明細 — {sumDate}</span>
              <span style={{fontSize:10,color:C.textSec}}>▲ 達標（紅）　▼ 未達標（綠）　✓ 高於水位　⚠ 低於水位</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr>
                    <th style={{...TH,textAlign:"left",minWidth:110}}>項目</th>
                    {filled.map(s=><th key={s} style={TH}>
                      <div style={{color:isMedium(s)?C.accent:C.fall,fontWeight:700}}>{s}</div>
                      <div style={{fontSize:9,color:C.textSec,fontWeight:400}}>{isMedium(s)?"中型":"小型"}</div>
                    </th>)}
                    <th style={{...TH,color:C.gold,borderLeft:`2px solid ${C.gold}`}}>合計</th>
                  </tr>
                </thead>
                <tbody>
                  {ITEMS.map((item,idx)=>{
                    const bg=idx%2===0?C.card:C.cardAlt;
                    const tot=sumItem(item.key);
                    return<tr key={item.key} style={{background:bg}}>
                      <td style={{...TD,fontWeight:600}}>
                        {item.label}
                        {item.hasTarget&&<div style={{fontSize:9,color:C.textSec}}>中{TARGETS[item.key]?.medium} / 小{TARGETS[item.key]?.small} {item.unit}</div>}
                      </td>
                      {filled.map(s=>{
                        const v=sumEnt[s]?.[item.key];
                        const met=item.hasTarget?meetsTarget(item.key,v,s):null;
                        return<td key={s} style={{...TD,textAlign:"center",background:met===null?bg:met?C.riseBg:C.fallBg,transition:"background .3s"}}>
                          <SummaryNum value={v} unit={item.unit} met={met} animate={animate}/>
                        </td>;
                      })}
                      <td style={{...TD,textAlign:"center",fontWeight:700,color:C.gold,borderLeft:`2px solid ${C.gold}44`,background:C.goldLight}}>
                        {tot!==null?<span style={{animation:animate?"countUp .6s ease":""}}>{tot}{item.unit}</span>:"—"}
                      </td>
                    </tr>;
                  })}

                  {/* 設備案 */}
                  {(()=>{
                    const tN=sumItem("device_num"),tC=sumItem("device_case");
                    const tT=(tN!==null||tC!==null)?(tN||0)+(tC||0):null;
                    const tP=tT>0?((tC||0)/tT*100):null;
                    const tOk=tP!==null?tP>=50:null;
                    return<tr style={{background:C.cardAlt}}>
                      <td style={{...TD,fontWeight:600}}>設備案/門號案<div style={{fontSize:9,color:C.textSec}}>總數 · 佔比 ≥ 50%</div></td>
                      {filled.map(s=>{
                        const f=sumEnt[s]||{};
                        const n=parseFloat(f.device_num)||0,c=parseFloat(f.device_case)||0;
                        const t=f.device_num!==undefined||f.device_case!==undefined?n+c:null;
                        const p=t>0?(c/t*100):null,ok=p!==null?p>=50:null;
                        return<td key={s} style={{...TD,textAlign:"center",background:ok===null?C.cardAlt:ok?C.fallBg:C.riseBg}}>
                          {t!==null?<>
                            <div style={{fontSize:10,color:C.textSec,marginBottom:2}}>門:{f.device_num||0} 設:{f.device_case||0} 計:{t}</div>
                            <div style={{fontWeight:700,fontSize:13,color:ok?C.fall:C.rise}}>{p!==null?`${p.toFixed(1)}%`:"—"} <ThreshBadge pct={p} size={12}/></div>
                            {p!==null&&<div style={{height:3,background:"#E8EDF5",borderRadius:2,marginTop:4,overflow:"hidden"}}><div style={{height:"100%",background:ok?C.fall:C.rise,width:`${Math.min(p,100)}%`,transition:"width .8s"}}></div></div>}
                          </>:<span style={{color:C.textDim}}>—</span>}
                        </td>;
                      })}
                      <td style={{...TD,textAlign:"center",borderLeft:`2px solid ${C.gold}44`,background:tOk===null?C.cardAlt:tOk?C.fallBg:C.riseBg}}>
                        {tT!==null?<>
                          <div style={{fontSize:10,color:C.textSec,marginBottom:2}}>門:{tN||0} 設:{tC||0} 計:{tT}</div>
                          <div style={{fontWeight:700,fontSize:13,color:tOk?C.fall:C.rise}}>{tP!==null?`${tP.toFixed(1)}%`:"—"} <ThreshBadge pct={tP} size={12}/></div>
                        </>:"—"}
                      </td>
                    </tr>;
                  })()}

                  {/* 保險搭售率 */}
                  {(()=>{
                    const tI=sumItem("insurance_count"),tP=sumItem("phone_sales");
                    const tPct=(tI!==null&&tP!==null&&tP>0)?(tI/tP*100):null;
                    const tOk=tPct!==null?tPct>=50:null;
                    return<tr style={{background:C.card}}>
                      <td style={{...TD,fontWeight:600}}>保險搭售率<div style={{fontSize:9,color:C.textSec}}>搭售數/手機銷售 ≥ 50%</div></td>
                      {filled.map(s=>{
                        const f=sumEnt[s]||{};
                        const i=parseFloat(f.insurance_count)||0,p=parseFloat(f.phone_sales)||0;
                        const pct=(f.insurance_count!==undefined&&f.phone_sales!==undefined&&p>0)?(i/p*100):null;
                        const ok=pct!==null?pct>=50:null;
                        return<td key={s} style={{...TD,textAlign:"center",background:ok===null?C.card:ok?C.fallBg:C.riseBg}}>
                          {pct!==null?<>
                            <div style={{fontSize:10,color:C.textSec,marginBottom:2}}>搭:{i} / 機:{p}</div>
                            <div style={{fontWeight:700,fontSize:13,color:ok?C.fall:C.rise}}>{pct.toFixed(1)}% <ThreshBadge pct={pct} size={12}/></div>
                            <div style={{height:3,background:"#E8EDF5",borderRadius:2,marginTop:4,overflow:"hidden"}}><div style={{height:"100%",background:ok?C.fall:C.rise,width:`${Math.min(pct,100)}%`,transition:"width .8s"}}></div></div>
                          </>:<span style={{color:C.textDim}}>—</span>}
                        </td>;
                      })}
                      <td style={{...TD,textAlign:"center",borderLeft:`2px solid ${C.gold}44`,background:tOk===null?C.card:tOk?C.fallBg:C.riseBg}}>
                        {tPct!==null?<>
                          <div style={{fontSize:10,color:C.textSec,marginBottom:2}}>搭:{tI} / 機:{tP}</div>
                          <div style={{fontWeight:700,fontSize:13,color:tOk?C.fall:C.rise}}>{tPct.toFixed(1)}% <ThreshBadge pct={tPct} size={12}/></div>
                        </>:"—"}
                      </td>
                    </tr>;
                  })()}
                </tbody>
              </table>
            </div>
          </div>}

          {filled.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:C.textDim,fontSize:13}}>
            {sumDate} 尚無回填資料
          </div>}
        </>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
