<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>北一二C 即時回報</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F4F6FA;color:#1A2332;font-family:-apple-system,'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;}
input,select,textarea{color:#1A2332!important;background:#fff!important;font-family:inherit;}
input::placeholder,textarea::placeholder{color:#B0BCC8;}
select option{background:#fff;color:#1A2332;}
textarea{resize:vertical;}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashGreen{0%{box-shadow:0 0 0 0 rgba(22,163,74,.4)}70%{box-shadow:0 0 0 8px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
@keyframes flashRed{0%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}70%{box-shadow:0 0 0 8px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.anim-countup{animation:countUp .35s ease-out both}
.anim-slide{animation:slideDown .28s ease-out both}
.anim-pop{animation:popIn .2s ease-out both}
.flash-green{animation:flashGreen .55s ease-out}
.flash-red{animation:flashRed .55s ease-out}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo}=React;

// ─────────────────────────────────────────
// 設定
// ─────────────────────────────────────────
const API_URL="https://north12c-report.n12c.workers.dev";
const STORES=["站前","忠孝東","天母","夜市","德東","南東","東區","公館","後山"];

// 每日目標（各店）
// 中型店（站前、忠孝東、天母）：配件7200 包膜2800 重點SD 7
// 小型店（其餘6店）：配件5100 包膜2100 重點SD 5
const TARGETS={
  站前:  {aq999:2,aq1399:1,r999:5,r1399:3,upgrade:2,downgrade:2,tewei:4,acc:7200,coating:2800,sd:7},
  忠孝東:{aq999:2,aq1399:1,r999:5,r1399:3,upgrade:2,downgrade:2,tewei:4,acc:7200,coating:2800,sd:7},
  天母:  {aq999:2,aq1399:1,r999:4,r1399:2,upgrade:2,downgrade:2,tewei:3,acc:7200,coating:2800,sd:7},
  夜市:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
  德東:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
  南東:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
  東區:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
  公館:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
  後山:  {aq999:1,aq1399:1,r999:3,r1399:2,upgrade:2,downgrade:2,tewei:2,acc:5100,coating:2100,sd:5},
};

// 需要請益表的欄位
const TRIGGER_KEYS=["aq999","aq1399","r1399"];
const TRIGGER_LABELS={aq999:"A999",aq1399:"A1399",r1399:"R1399"};

const C={
  bg:"#F4F6FA",card:"#FFFFFF",border:"#DDE3EC",
  gold:"#B8860B",goldLight:"#FDF8EC",goldBorder:"#E8C84A",
  navy:"#0F2A52",navyMid:"#1E5FAA",navyLight:"#3A8FD4",
  red:"#DC2626",redLight:"#FEF2F2",redBorder:"#FECACA",
  green:"#16A34A",greenLight:"#F0FDF4",greenBorder:"#86EFAC",
  amber:"#B45309",amberLight:"#FFFBEB",amberBorder:"#FCD34D",
  purple:"#7C3AED",purpleLight:"#F5F3FF",
  teal:"#0891B2",tealLight:"#ECFEFF",
  textMain:"#1A2332",textSub:"#4A5568",textDim:"#9CA3AF",
  line:"#E2E8F0",shadow:"0 2px 12px rgba(15,42,82,.08)",
};

function emptyQixieItem(){
  return{
    handler:"",       // 承辦人
    situation:"",     // 進店情境
    product:"",       // 成交商品
    changeType:"符合", // 提前/通轉/符合
    plan:"",          // 上線資費
    dealPrice:"",     // 成交價
    iceBreak:"",      // 破冰方式
    entry:"",         // 切入點方式
    closing:"",       // 何時出現締結點
    rightThings:"",   // 同仁做對的事
  };
}

function emptyForm(){
  return{
    aq999:"",aq1399:"",
    r999:"",r1399:"",
    upgrade:"",downgrade:"",
    device:"",line:"",
    insurance:"",phone_sales:"",
    tewei:"",
    acc:"",coating:"",sd:"",
    ott_video:"",ott_apple:"",ott_hbo:"",ott_nf:"",
    note:"",
    qixies:{aq999:[],aq1399:[],r1399:[]},
    // 20:00 未達說明 {aq999:"", aq1399:"", r999:"", r1399:""}
    reasons:{aq999:"",aq1399:"",r999:"",r1399:""},
  };
}

function today(){
  return new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,"-");
}

// ─────────────────────────────────────────
// 數字動畫 hook
// ─────────────────────────────────────────
function useCountUp(target,dur=600){
  const[v,setV]=useState(0);
  const raf=useRef(null);
  useEffect(()=>{
    const n=parseFloat(target)||0;
    if(!n){setV(0);return;}
    const t0=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-t0)/dur,1);
      setV(Math.round(n*(1-Math.pow(1-p,3))*10)/10);
      if(p<1) raf.current=requestAnimationFrame(tick); else setV(n);
    };
    raf.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf.current);
  },[target]);
  return v;
}

// ─────────────────────────────────────────
// API
// ─────────────────────────────────────────
async function apiGet(date){
  try{const r=await fetch(`${API_URL}/data?date=${date}`);return r.ok?await r.json():null;}
  catch{return null;}
}
async function apiPost(date,store,form){
  try{const r=await fetch(`${API_URL}/data`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({date,store,form})});return r.ok;}
  catch{return false;}
}

// ─────────────────────────────────────────
// FieldRow：標籤右側直接顯示目標進度
// ─────────────────────────────────────────
function FieldRow({label,value,onChange,highlight,hlColor,target,warn,hasError}){
  const ref=useRef(null);
  const n=parseInt(value||0);
  const hasTarget=!!target;
  const tgtN=parseInt(target||0);
  const hit=hasTarget&&n>=tgtN;
  const isWarn=warn&&n>=2;
  // 空值（未填）且有 hasError → 紅框
  const isEmpty=(value===""||value===null||value===undefined);

  useEffect(()=>{
    if(!ref.current) return;
    ref.current.classList.remove("flash-green","flash-red");
    void ref.current.offsetWidth;
    if(n>0&&highlight) ref.current.classList.add("flash-green");
    if(isWarn) ref.current.classList.add("flash-red");
  },[value]);

  const borderColor=
    hasError&&isEmpty ? C.red :
    isWarn ? C.red :
    hit ? C.green :
    highlight&&n>0 ? (hlColor||C.navyMid) :
    C.border;

  const bgColor=
    hasError&&isEmpty ? "#FFF5F5" :
    isWarn ? C.redLight :
    hit ? C.greenLight :
    highlight&&n>0 ? `${hlColor||C.navyMid}08` :
    "#fff";

  return(
    <div ref={ref} style={{display:"flex",flexDirection:"column",gap:4}}
      className={hasError&&isEmpty?"field-error":""}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <label style={{fontSize:11,color:hasError&&isEmpty?C.red:C.textDim,fontWeight:700,letterSpacing:.5}}>
          {hasError&&isEmpty&&"* "}{label}
        </label>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {hasTarget&&(
            <span style={{fontSize:10,fontWeight:700,
              color:hit?C.green:C.textDim,
              background:hit?C.greenLight:"transparent",
              borderRadius:10,padding:hit?"1px 6px":"0",transition:"all .2s"}}>
              {hit?"✅":"🎯"} {n}/{tgtN}
            </span>
          )}
          {highlight&&!warn&&n>=2&&!hasTarget&&(
            <span className="anim-pop" style={{fontSize:10,fontWeight:700,color:C.green}}>👍</span>
          )}
          {isWarn&&(
            <span className="anim-pop" style={{fontSize:10,fontWeight:700,color:C.red}}>⚠️</span>
          )}
        </div>
      </div>
      <input type="number" min="0" value={value} onChange={e=>onChange(e.target.value)}
        placeholder="0"
        style={{border:`2px solid ${borderColor}`,borderRadius:6,padding:"7px 10px",
          fontSize:18,fontWeight:800,outline:"none",textAlign:"center",
          background:bgColor,transition:"border-color .2s,background .2s"}}/>
      {hasTarget&&n>0&&(
        <div style={{height:3,background:C.line,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${Math.min(n/tgtN*100,100)}%`,height:"100%",
            background:hit?C.green:C.amber,borderRadius:2,transition:"width .4s ease"}}/>
        </div>
      )}
      {isWarn&&(
        <div className="anim-slide" style={{fontSize:10,color:C.red,fontWeight:700}}>⚠️ 降轉偏高，請關注</div>
      )}
      {hasError&&isEmpty&&(
        <div style={{fontSize:10,color:C.red,fontWeight:700}}>必填</div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────
// FieldRowMoney：金額輸入（千分位顯示＋目標進度）
// ─────────────────────────────────────────
function FieldRowMoney({label,value,onChange,target,unit="元",hasError}){
  const ref=useRef(null);
  const n=parseInt(value||0);
  const tgtN=parseInt(target||0);
  const hit=tgtN>0&&n>=tgtN;
  const pct=tgtN>0?Math.min(Math.round(n/tgtN*100),100):0;
  const isEmpty=(value===""||value===null||value===undefined);

  useEffect(()=>{
    if(!ref.current) return;
    ref.current.classList.remove("flash-green");
    void ref.current.offsetWidth;
    if(n>0) ref.current.classList.add("flash-green");
  },[value]);

  const borderColor=hasError&&isEmpty?C.red:hit?C.green:n>0?"#0369a1":C.border;
  const bgColor=hasError&&isEmpty?"#FFF5F5":hit?C.greenLight:n>0?"#EFF9FF":"#fff";

  return(
    <div ref={ref} style={{display:"flex",flexDirection:"column",gap:4}}
      className={hasError&&isEmpty?"field-error":""}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <label style={{fontSize:11,color:hasError&&isEmpty?C.red:C.textDim,fontWeight:700,letterSpacing:.5}}>
          {hasError&&isEmpty&&"* "}{label}
        </label>
        {tgtN>0&&(
          <span style={{fontSize:10,fontWeight:700,
            color:hit?C.green:C.textDim,
            background:hit?C.greenLight:"transparent",
            borderRadius:10,padding:hit?"1px 6px":"0",transition:"all .2s"}}>
            {hit?"✅":"🎯"} {n.toLocaleString()}/{tgtN.toLocaleString()}
          </span>
        )}
      </div>
      <div style={{position:"relative"}}>
        <input type="number" min="0" value={value} onChange={e=>onChange(e.target.value)}
          placeholder="0"
          style={{width:"100%",border:`2px solid ${borderColor}`,
            borderRadius:6,padding:"7px 10px",
            fontSize:16,fontWeight:800,outline:"none",textAlign:"center",
            background:bgColor,transition:"border-color .2s,background .2s"}}/>
        {n>0&&<span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
          fontSize:10,color:C.textDim,pointerEvents:"none"}}>{unit}</span>}
      </div>
      {n>0&&(
        <div style={{fontSize:11,color:hit?C.green:"#0369a1",fontWeight:700,textAlign:"center"}}>
          $ {n.toLocaleString()}
        </div>
      )}
      {tgtN>0&&n>0&&(
        <div style={{height:3,background:C.line,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",
            background:hit?C.green:C.amber,borderRadius:2,transition:"width .4s ease"}}/>
        </div>
      )}
      {hasError&&isEmpty&&(
        <div style={{fontSize:10,color:C.red,fontWeight:700}}>必填</div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────
// FieldGroup
// ─────────────────────────────────────────
function FieldGroup({label,color,children}){
  return(
    <div style={{marginBottom:14,border:`1.5px solid ${color}25`,borderRadius:8,overflow:"hidden"}}>
      <div style={{background:`${color}12`,borderBottom:`1.5px solid ${color}25`,padding:"6px 14px",fontSize:11,fontWeight:900,color,letterSpacing:1.5}}>
        {label}
      </div>
      <div style={{padding:"12px 14px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"10px 18px"}}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
// RatioBar
// ─────────────────────────────────────────
function RatioBar({ratio,warn=50,color}){
  const c=ratio>=warn?C.green:C.red;
  return(
    <div style={{flex:1,height:6,background:C.line,borderRadius:3,overflow:"hidden"}}>
      <div style={{width:`${Math.min(ratio,100)}%`,height:"100%",background:color||c,borderRadius:3,transition:"width .4s ease"}}/>
    </div>
  );
}

// ─────────────────────────────────────────
// AnimCell (彙整表格用)
// ─────────────────────────────────────────
function AnimCell({val,bg="",color="",bold=true}){
  const n=useCountUp(parseFloat(val)||0,500);
  return(
    <td style={{textAlign:"center",padding:"7px 8px",background:bg,transition:"background .3s"}}>
      <span className="anim-countup" style={{fontWeight:bold?700:400,color:color||C.navy,fontSize:13}}>{n||0}</span>
    </td>
  );
}

function thSt(align="center",minW,bg){
  return{textAlign:align,padding:"8px 10px",fontWeight:700,fontSize:11,color:C.textSub,
    borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap",
    minWidth:minW||undefined,background:bg||"#F8FAFC"};
}

// ─────────────────────────────────────────
// 主 App
// ─────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("fill");
  const[store,setStore]=useState(STORES[0]);
  const[date,setDate]=useState(today());
  const[form,setForm]=useState(emptyForm());
  const[sumDate,setSumDate]=useState(today());
  const[sumData,setSumData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState(null);

  const tgt=useMemo(()=>TARGETS[store]||{},[store]);

  const triggeredKeys=useMemo(()=>
    TRIGGER_KEYS.filter(k=>parseInt(form[k]||0)>0)
  ,[form]);

  // ── 時段判斷 ──
  // p1: 16:00–17:59 第一階段（填KPI可存）
  // p2: 19:00–20:59 第二階段（需未達說明）
  // locked: 其他時間（不可存檔）
  function getPhase(){
    const h=new Date().getHours();
    if(h>=16&&h<18) return "p1";
    if(h>=19&&h<21) return "p2";
    return "locked";
  }
  const phase=getPhase();
  const PHASE_LABEL={p1:"16:00 第一階段回報",p2:"19:00 第二階段回報",locked:"非回報時段"};
  const PHASE_COLOR={p1:"#0369a1",p2:"#7c3aed",locked:"#6B7280"};

  // AQ/RT 四個方案欄位，20:00需填未達說明
  const AQ_RT_KEYS=[
    {key:"aq999", label:"A999"},
    {key:"aq1399",label:"A1399"},
    {key:"r999",  label:"R999"},
    {key:"r1399", label:"R1399"},
  ];

  // ── 驗證錯誤狀態 ──
  const[errors,setErrors]=useState({});
  const[submitAttempted,setSubmitAttempted]=useState(false);

  // 必填欄位（兩個時段都需要）
  const REQUIRED_FIELDS=[
    {key:"aq999",   label:"A999"},
    {key:"aq1399",  label:"A1399"},
    {key:"r999",    label:"R999"},
    {key:"r1399",   label:"R1399"},
    {key:"upgrade", label:"升轉件數"},
    {key:"downgrade",label:"降轉件數"},
    {key:"device",  label:"設備案"},
    {key:"line",    label:"門號案"},
    {key:"insurance",label:"保險搭售數"},
    {key:"phone_sales",label:"手機銷售數"},
    {key:"tewei",   label:"特維件數"},
    {key:"acc",     label:"配件金額"},
    {key:"coating", label:"包膜金額"},
    {key:"sd",      label:"重點SD件數"},
    {key:"ott_video",label:"Video+KKBOX"},
    {key:"ott_apple",label:"Apple服務"},
    {key:"ott_hbo", label:"HBO"},
    {key:"ott_nf",  label:"NF/P"},
  ];

  function validate(f, ph){
    const errs={};
    // 共同必填（兩時段都要）
    REQUIRED_FIELDS.forEach(({key,label})=>{
      if(f[key]===""||f[key]===null||f[key]===undefined){
        errs[key]=`${label} 未填寫`;
      }
    });
    // 請益明細（有成交才需要）
    TRIGGER_KEYS.forEach(k=>{
      if(parseInt(f[k]||0)>0&&!(f.qixies[k]||[]).length){
        errs[`qixie_${k}`]=`${TRIGGER_LABELS[k]} 有成交，請填寫請益明細`;
      }
    });
    // 20:00 額外驗證：AQ/RT 未達目標需填回報說明
    if(ph==="p2"){
      AQ_RT_KEYS.forEach(({key,label})=>{
        const val=parseInt(f[key]||0);
        const tgtVal=parseInt((TARGETS[store]||{})[key]||0);
        if(tgtVal>0 && val<tgtVal){
          // 未達目標 → 回報說明必填
          if(!(f.reasons[key]||"").trim()){
            errs[`reason_${key}`]=`${label} 未達目標（${val}/${tgtVal}），請填寫未達說明`;
          }
        }
      });
    }
    return errs;
  }

  function showToast(msg,ok=true){
    setToast({msg,ok});
    setTimeout(()=>setToast(null),3200);
  }
  function setField(k,v){
    setForm(f=>{
      const nf={...f,[k]:v};
      if(submitAttempted) setErrors(validate(nf, phase));
      return nf;
    });
  }
  function setReason(k,v){
    setForm(f=>{
      const nf={...f,reasons:{...f.reasons,[k]:v}};
      if(submitAttempted) setErrors(validate(nf, phase));
      return nf;
    });
  }
  function addQixie(tk){setForm(f=>({...f,qixies:{...f.qixies,[tk]:[...f.qixies[tk],emptyQixieItem()]}}));}
  function removeQixie(tk,i){setForm(f=>{const a=[...f.qixies[tk]];a.splice(i,1);return{...f,qixies:{...f.qixies,[tk]:a}};});}
  function setQixieField(tk,i,field,v){setForm(f=>{const a=f.qixies[tk].map((x,j)=>j===i?{...x,[field]:v}:x);return{...f,qixies:{...f.qixies,[tk]:a}};});}

  async function handleSubmit(){
    if(phase==="locked"){
      showToast("🔒 非回報時段（16:00–17:59 或 19:00–20:59）",false); return;
    }
    setSubmitAttempted(true);
    const errs=validate(form, phase);
    setErrors(errs);
    if(Object.keys(errs).length>0){
      showToast(`❌ 尚有 ${Object.keys(errs).length} 個欄位未填妥`,false);
      setTimeout(()=>{
        const el=document.querySelector(".field-error");
        if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
      },100);
      return;
    }
    setSaving(true);
    const ok=await apiPost(date,store,{...form,phase});
    setSaving(false);
    if(ok){
      showToast(`✅ ${PHASE_LABEL[phase]} 回報成功！`);
      setSubmitAttempted(false);
      setErrors({});
    } else {
      showToast("❌ 送出失敗，請稍後再試",false);
    }
  }

  async function loadSummary(){
    setLoading(true);
    setSumData(await apiGet(sumDate));
    setLoading(false);
  }
  useEffect(()=>{if(tab==="summary")loadSummary();},[tab,sumDate]);

  const devTotal=(parseInt(form.device||0)+parseInt(form.line||0))||0;
  const devRatio=devTotal>0?Math.round(parseInt(form.device||0)/devTotal*100):0;
  const insRatio=parseInt(form.phone_sales||0)>0?Math.round(parseInt(form.insurance||0)/parseInt(form.phone_sales)*100):0;

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* NAV */}
      <div style={{background:C.navy,borderBottom:`3px solid ${C.goldBorder}`,padding:"0 20px",
        display:"flex",alignItems:"stretch",position:"sticky",top:0,zIndex:100,
        boxShadow:"0 2px 12px rgba(15,42,82,.22)"}}>
        <div style={{color:C.goldBorder,fontWeight:900,fontSize:16,letterSpacing:2,padding:"14px 0",marginRight:24}}>北一二C</div>

          <button key={k} onClick={()=>setTab(k)}
            style={{background:"none",border:"none",cursor:"pointer",padding:"0 18px",fontFamily:"inherit",
              color:tab===k?"#fff":C.navyLight,fontWeight:tab===k?900:400,fontSize:14,
              borderBottom:tab===k?`3px solid ${C.goldBorder}`:"3px solid transparent",
              marginBottom:"-3px",transition:"all .2s"}}>
            {lbl}
          </button>
        ))}
        <div style={{flex:1}}/>
        <div style={{color:C.navyLight,fontSize:12,alignSelf:"center"}}>{today()}</div>
      </div>

      {/* ═══ 填寫回報 ═══ */}
      {tab==="fill"&&(
        <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>

          {/* 時段 Banner */}
          <div style={{
            background: phase==="p2"?"#F5F3FF": phase==="p1"?"#EFF9FF":"#F9FAFB",
            border:`2px solid ${phase==="p2"?"#7c3aed":phase==="p1"?"#0369a1":C.border}`,
            borderRadius:10,padding:"10px 18px",marginBottom:16,
            display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:22}}>
              {phase==="p2"?"🌙":phase==="p1"?"🌤️":"🔒"}
            </span>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:14,
                color:phase==="p2"?"#7c3aed":phase==="p1"?"#0369a1":C.textDim}}>
                {phase==="p2"?"19:00 第二階段回報（19:00–20:59）"
                  :phase==="p1"?"16:00 第一階段回報（16:00–17:59）"
                  :"🔒 非回報時段，目前無法存檔"}
              </div>
              <div style={{fontSize:11,color:C.textSub,marginTop:2}}>
                {phase==="p2"
                  ?"AQ/RT 任一未達目標，需填未達說明與請益資料才可送出"
                  :phase==="p1"
                  ?"填妥所有 KPI 即可存檔，19:00 後需進行第二階段回報"
                  :"回報時段：第一階段 16:00–17:59，第二階段 19:00–20:59"}
              </div>
            </div>
            {/* 目前時間顯示 */}
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:18,fontWeight:900,
                color:phase==="p2"?"#7c3aed":phase==="p1"?"#0369a1":C.textDim}}>
                {new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})}
              </div>
              <div style={{fontSize:10,color:C.textDim}}>{today()}</div>
            </div>
          </div>

          {/* 店別 + 日期 */}
          <div style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,
            padding:"14px 18px",marginBottom:16,boxShadow:C.shadow,
            display:"flex",gap:20,flexWrap:"wrap",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700,letterSpacing:1}}>門市</div>
              <select value={store} onChange={e=>setStore(e.target.value)}
                style={{border:`2px solid ${C.navyLight}`,borderRadius:6,padding:"6px 12px",fontSize:15,fontWeight:700,outline:"none"}}>
                {STORES.map(s=><option key={s} value={s}>台北{s}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700,letterSpacing:1}}>日期</div>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{border:`2px solid ${C.border}`,borderRadius:6,padding:"6px 12px",fontSize:14,outline:"none"}}/>
            </div>
          </div>

          {/* KPI 欄位卡 */}
          <div style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:16,boxShadow:C.shadow}}>
            <div style={{background:C.navy,padding:"10px 18px",color:C.goldBorder,fontWeight:900,fontSize:14,letterSpacing:1}}>■ KPI 業績回報</div>
            <div style={{padding:"16px 18px"}}>

              {/* AQ 方案 */}
              <FieldGroup label="AQ 方案" color="#0f5c3a">
                <FieldRow label="A999" value={form.aq999} onChange={v=>setField("aq999",v)}
                  highlight target={tgt.aq999} hlColor="#0f5c3a" hasError={!!errors.aq999}/>
                <FieldRow label="A1399" value={form.aq1399} onChange={v=>setField("aq1399",v)}
                  highlight target={tgt.aq1399} hlColor="#0f5c3a" hasError={!!errors.aq1399}/>
              </FieldGroup>

              {/* RT 方案 */}
              <FieldGroup label="RT 方案" color={C.navyMid}>
                <FieldRow label="R999" value={form.r999} onChange={v=>setField("r999",v)}
                  highlight target={tgt.r999} hlColor={C.navyMid} hasError={!!errors.r999}/>
                <FieldRow label="R1399" value={form.r1399} onChange={v=>setField("r1399",v)}
                  highlight target={tgt.r1399} hlColor="#8a1a00" hasError={!!errors.r1399}/>
              </FieldGroup>

              {/* 第二階段未達說明區塊（只在 19:00–20:59 且有未達才顯示） */}
              {phase==="p2"&&(()=>{
                const unmet=AQ_RT_KEYS.filter(({key})=>{
                  const val=parseInt(form[key]||0);
                  const t=parseInt(tgt[key]||0);
                  return t>0&&val<t;
                });
                if(!unmet.length) return null;
                return(
                  <div className="anim-slide" style={{background:"#F5F3FF",border:`2px solid #7c3aed`,
                    borderRadius:8,overflow:"hidden",marginBottom:14}}>
                    <div style={{background:"#7c3aed",padding:"8px 14px",color:"#fff",fontWeight:900,fontSize:13,
                      display:"flex",alignItems:"center",gap:6}}>
                      🌙 20:00 未達說明（必填）
                    </div>
                    <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
                      {unmet.map(({key,label})=>{
                        const val=parseInt(form[key]||0);
                        const t=parseInt(tgt[key]||0);
                        const hasErr=!!errors[`reason_${key}`];
                        return(
                          <div key={key} className={hasErr?"field-error":""}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                              <span style={{background:"#7c3aed",color:"#fff",borderRadius:4,
                                padding:"1px 8px",fontSize:12,fontWeight:900}}>{label}</span>
                              <span style={{fontSize:12,color:C.red,fontWeight:700}}>
                                {val}/{t}件 — 未達目標
                              </span>
                            </div>
                            <textarea
                              value={form.reasons[key]||""}
                              onChange={e=>setReason(key,e.target.value)}
                              placeholder={`說明 ${label} 未達目標原因、改善方向…`}
                              rows={2}
                              style={{width:"100%",
                                border:`2px solid ${hasErr?C.red:"#7c3aed50"}`,
                                borderRadius:6,padding:"8px 10px",fontSize:13,
                                outline:"none",resize:"vertical",fontFamily:"inherit",
                                background:hasErr?"#FFF5F5":"#fff",lineHeight:1.6}}/>
                            {hasErr&&<div style={{fontSize:10,color:C.red,fontWeight:700,marginTop:2}}>必填：請說明未達原因</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* 升降轉 */}
              <FieldGroup label="升降轉" color={C.purple}>
                <FieldRow label="升轉件數" value={form.upgrade} onChange={v=>setField("upgrade",v)}
                  highlight hlColor={C.green} hasError={!!errors.upgrade}/>
                <FieldRow label="降轉件數" value={form.downgrade} onChange={v=>setField("downgrade",v)}
                  warn hlColor={C.red} hasError={!!errors.downgrade}/>
              </FieldGroup>

              {/* 設備案 */}
              <FieldGroup label="設備案 / 門號案" color={C.navy}>
                <FieldRow label="設備案" value={form.device} onChange={v=>setField("device",v)} hasError={!!errors.device}/>
                <FieldRow label="門號案" value={form.line} onChange={v=>setField("line",v)} hasError={!!errors.line}/>
                <div style={{gridColumn:"1/-1",display:"flex",gap:8,alignItems:"center",paddingTop:2}}>
                  <span style={{fontSize:11,color:C.textSub,whiteSpace:"nowrap"}}>設備案佔比</span>
                  <RatioBar ratio={devRatio}/>
                  <span style={{fontSize:13,fontWeight:700,color:devRatio>=50?C.green:C.red,whiteSpace:"nowrap"}}>{devTotal>0?`${devRatio}%`:"—"}</span>
                </div>
              </FieldGroup>

              {/* 保險 */}
              <FieldGroup label="保險搭售" color={C.purple}>
                <FieldRow label="保險搭售數" value={form.insurance} onChange={v=>setField("insurance",v)} hasError={!!errors.insurance}/>
                <FieldRow label="手機銷售數" value={form.phone_sales} onChange={v=>setField("phone_sales",v)} hasError={!!errors.phone_sales}/>
                <div style={{gridColumn:"1/-1",display:"flex",gap:8,alignItems:"center",paddingTop:2}}>
                  <span style={{fontSize:11,color:C.textSub,whiteSpace:"nowrap"}}>搭售率</span>
                  <RatioBar ratio={insRatio} color={C.purple}/>
                  <span style={{fontSize:13,fontWeight:700,color:insRatio>=50?C.green:C.red,whiteSpace:"nowrap"}}>{parseInt(form.phone_sales||0)>0?`${insRatio}%`:"—"}</span>
                </div>
              </FieldGroup>

              {/* 特維 */}
              <FieldGroup label="特維" color={C.amber}>
                <FieldRow label="特維件數" value={form.tewei} onChange={v=>setField("tewei",v)}
                  highlight hlColor={C.amber} target={tgt.tewei} hasError={!!errors.tewei}/>
              </FieldGroup>

              {/* 配件 / 包膜 / 重點SD */}
              <FieldGroup label="配件 / 包膜 / 重點SD" color="#0369a1">
                <FieldRowMoney label="配件金額" value={form.acc} onChange={v=>setField("acc",v)}
                  target={tgt.acc} unit="元" hasError={!!errors.acc}/>
                <FieldRowMoney label="包膜金額" value={form.coating} onChange={v=>setField("coating",v)}
                  target={tgt.coating} unit="元" hasError={!!errors.coating}/>
                <FieldRow label="重點SD件數" value={form.sd} onChange={v=>setField("sd",v)}
                  highlight hlColor="#0369a1" target={tgt.sd} hasError={!!errors.sd}/>
              </FieldGroup>

              {/* OTT */}
              <FieldGroup label="OTT 加值" color={C.teal}>
                <FieldRow label="Video+KKBOX" value={form.ott_video} onChange={v=>setField("ott_video",v)} hasError={!!errors.ott_video}/>
                <FieldRow label="Apple 服務" value={form.ott_apple} onChange={v=>setField("ott_apple",v)} hasError={!!errors.ott_apple}/>
                <FieldRow label="HBO" value={form.ott_hbo} onChange={v=>setField("ott_hbo",v)} hasError={!!errors.ott_hbo}/>
                <FieldRow label="NF/P" value={form.ott_nf} onChange={v=>setField("ott_nf",v)} hasError={!!errors.ott_nf}/>
              </FieldGroup>
            </div>
          </div>

          {/* 請益表觸發區塊 */}
          {triggeredKeys.length>0&&(
            <div className="anim-slide" style={{background:C.amberLight,border:`2px solid ${C.amberBorder}`,
              borderRadius:10,overflow:"hidden",marginBottom:16,boxShadow:C.shadow}}>
              <div style={{background:"#92400e",padding:"10px 18px",color:"#fff",fontWeight:900,fontSize:14,
                display:"flex",alignItems:"center",gap:8}}>
                <span>⚠️</span>
                <span>偵測到 {triggeredKeys.map(k=>TRIGGER_LABELS[k]).join("、")} 成交 — 請填寫請益明細</span>
              </div>
              <div style={{padding:"14px 18px"}}>
                <p style={{fontSize:12,color:"#7c2d12",marginBottom:14,fontWeight:600}}>
                  有 A999、A1399 或 R1399 成交時，需記錄每筆承辦人、成交商品與締結關鍵，方便督導彙整案例。
                </p>
                {triggeredKeys.map(tk=>(
                  <div key={tk} style={{marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{background:tk==="r1399"?"#8a1a00":"#0f5c3a",color:"#fff",
                          borderRadius:4,padding:"2px 10px",fontSize:12,fontWeight:900}}>
                          {TRIGGER_LABELS[tk]}
                        </span>
                        <span style={{fontSize:12,color:C.textSub}}>共 {parseInt(form[tk]||0)} 筆</span>
                      </div>
                      <button onClick={()=>addQixie(tk)}
                        style={{background:C.navy,color:"#fff",border:"none",borderRadius:6,
                          padding:"5px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                        ＋ 新增
                      </button>
                    </div>
                    {!(form.qixies[tk]||[]).length&&(
                      <div style={{textAlign:"center",padding:"11px",color:C.red,fontSize:12,fontWeight:700,
                        background:C.redLight,borderRadius:6,border:`1px solid ${C.redBorder}`}}>
                        ⚡ 至少填一筆才能送出
                      </div>
                    )}
                    {(form.qixies[tk]||[]).map((item,i)=>(
                      <div key={i} className="anim-slide" style={{
                        background:"#fff",border:`2px solid ${tk==="r1399"?"#8a1a00":"#0f5c3a"}`,
                        borderRadius:10,marginBottom:12,overflow:"hidden"}}>
                        {/* 卡片標題列 */}
                        <div style={{
                          background:tk==="r1399"?"#8a1a00":"#0f5c3a",
                          padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{color:"#fff",fontWeight:900,fontSize:13}}>
                            第 {i+1} 筆　{TRIGGER_LABELS[tk]}
                          </span>
                          <button onClick={()=>removeQixie(tk,i)}
                            style={{background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.4)",
                              borderRadius:6,color:"#fff",fontSize:13,fontWeight:700,
                              cursor:"pointer",padding:"3px 10px"}}>✕ 刪除</button>
                        </div>

                        <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>

                          {/* 行 1：承辦人 ＋ 提前通轉符合 ＋ 資費 ＋ 成交價 */}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
                            {[
                              {lbl:"👤 承辦人",field:"handler",ph:"姓名",type:"text"},
                              {lbl:"🔄 異動類別",field:"changeType",ph:"",type:"select",opts:["符合","提前","通轉","預付卡"]},
                              {lbl:"📶 上線資費",field:"plan",ph:"如 1399",type:"text"},
                              {lbl:"💰 成交價",field:"dealPrice",ph:"如 0元",type:"text"},
                            ].map(({lbl,field,ph,type,opts})=>(
                              <div key={field}>
                                <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700}}>{lbl}</div>
                                {type==="select"
                                  ?<select value={item[field]} onChange={e=>setQixieField(tk,i,field,e.target.value)}
                                      style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,
                                        padding:"7px 8px",fontSize:14,fontWeight:700,outline:"none"}}>
                                      {opts.map(o=><option key={o}>{o}</option>)}
                                    </select>
                                  :<input value={item[field]} onChange={e=>setQixieField(tk,i,field,e.target.value)}
                                      placeholder={ph}
                                      style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,
                                        padding:"7px 8px",fontSize:14,outline:"none"}}/>
                                }
                              </div>
                            ))}
                          </div>

                          {/* 行 2：進店情境（整行） */}
                          <div>
                            <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700}}>🏪 進店情境</div>
                            <input value={item.situation} onChange={e=>setQixieField(tk,i,"situation",e.target.value)}
                              placeholder="用戶進店目的、原本詢問什麼…"
                              style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,
                                padding:"7px 10px",fontSize:14,outline:"none"}}/>
                          </div>

                          {/* 行 3：成交商品（整行） */}
                          <div>
                            <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700}}>📦 成交商品</div>
                            <input value={item.product} onChange={e=>setQixieField(tk,i,"product",e.target.value)}
                              placeholder="手機型號、配件或方案名稱…"
                              style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,
                                padding:"7px 10px",fontSize:14,outline:"none"}}/>
                          </div>

                          {/* 分隔：成交分析 */}
                          <div style={{borderTop:`1.5px dashed ${C.border}`,paddingTop:10}}>
                            <div style={{fontSize:10,color:C.textDim,fontWeight:900,letterSpacing:1,marginBottom:8}}>
                              ■ 成交分析
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                              {[
                                {lbl:"🧊 破冰方式",field:"iceBreak",ph:"如何打開話題、建立關係…"},
                                {lbl:"🎯 切入點方式",field:"entry",ph:"怎麼引導到這個方案…"},
                                {lbl:"⚡ 何時出現締結點",field:"closing",ph:"哪個動作或說法讓客戶點頭…"},
                                {lbl:"✅ 同仁做對的事",field:"rightThings",ph:"這筆成交的關鍵行為是什麼…"},
                              ].map(({lbl,field,ph})=>(
                                <div key={field}>
                                  <div style={{fontSize:10,color:C.textDim,marginBottom:4,fontWeight:700}}>{lbl}</div>
                                  <textarea value={item[field]} onChange={e=>setQixieField(tk,i,field,e.target.value)}
                                    placeholder={ph} rows={2}
                                    style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,
                                      padding:"7px 8px",fontSize:13,outline:"none",resize:"vertical",
                                      fontFamily:"inherit",lineHeight:1.5}}/>
                                </div>
                              ))}
                            </div>
                          </div>

                        </div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 錯誤摘要 */}
          {submitAttempted&&Object.keys(errors).length>0&&(
            <div className="anim-slide field-error" style={{background:C.redLight,border:`2px solid ${C.redBorder}`,
              borderRadius:10,padding:"14px 18px",marginBottom:16}}>
              <div style={{fontWeight:900,color:C.red,fontSize:14,marginBottom:10}}>
                ❌ 以下 {Object.keys(errors).length} 個欄位未填妥，無法送出
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {Object.values(errors).map((msg,i)=>(
                  <span key={i} style={{background:"#fff",border:`1.5px solid ${C.redBorder}`,
                    borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700,color:C.red}}>
                    ⚠ {msg}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* 備註 */}
          <div style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,
            padding:"14px 18px",marginBottom:16,boxShadow:C.shadow}}>
            <div style={{fontSize:10,color:C.textDim,marginBottom:6,fontWeight:700,letterSpacing:1}}>備註（選填）</div>
            <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
              rows={2} placeholder="其他補充說明"
              style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:6,padding:"8px 10px",fontSize:14,outline:"none"}}/>
          </div>

          <button onClick={handleSubmit} disabled={saving||phase==="locked"}
            style={{width:"100%",padding:"14px 0",
              background: saving?"#9CA3AF"
                : phase==="locked"?"#9CA3AF"
                : submitAttempted&&Object.keys(errors).length>0?C.red
                : phase==="p2"?"#7c3aed"
                : "#0369a1",
              color:"#fff",border:"none",borderRadius:10,fontSize:16,fontWeight:900,
              cursor:saving||phase==="locked"?"not-allowed":"pointer",
              boxShadow:"0 4px 14px rgba(15,42,82,.3)",
              letterSpacing:1,transition:"background .3s"}}>
            {saving ? "送出中…"
              : phase==="locked" ? "🔒 非回報時段"
              : submitAttempted&&Object.keys(errors).length>0
                ? `❌ 尚有 ${Object.keys(errors).length} 項未填 — 請檢查上方`
              : phase==="p2" ? "🌙 送出第二階段回報"
              : "🌤️ 送出第一階段回報"}
          </button>
        </div>
      )}

      {/* ═══ 當日彙整 ═══ */}
      {tab==="summary"&&(
        <div style={{maxWidth:1180,margin:"0 auto",padding:"20px 16px"}}>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
            <input type="date" value={sumDate} onChange={e=>setSumDate(e.target.value)}
              style={{border:`2px solid ${C.border}`,borderRadius:6,padding:"7px 12px",fontSize:14,outline:"none"}}/>
            <button onClick={loadSummary}
              style={{background:C.navy,color:"#fff",border:"none",borderRadius:6,
                padding:"7px 20px",fontSize:14,fontWeight:700,cursor:"pointer"}}>🔄 更新</button>
            {loading&&<span style={{color:C.textDim,fontSize:13}}>載入中…</span>}
          </div>
          {sumData&&<SummaryView data={sumData} date={sumDate}/>}
          {!loading&&!sumData&&(
            <div style={{textAlign:"center",padding:"60px 0",color:C.textDim,fontSize:14}}>
              {sumDate} 尚無回填資料
            </div>
          )}
        </div>
      )}

      {/* TOAST */}
      {toast&&(
        <div className="anim-slide" style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",
          background:toast.ok!==false?C.green:C.red,color:"#fff",
          padding:"12px 28px",borderRadius:30,fontSize:15,fontWeight:700,
          boxShadow:"0 4px 18px rgba(0,0,0,.22)",zIndex:999,whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────
// 彙整頁
// ─────────────────────────────────────────
function SummaryView({data,date}){
  const filled=STORES.filter(s=>data[s]);
  const pending=STORES.filter(s=>!data[s]);

  function missingQixie(sd){
    if(!sd) return[];
    return TRIGGER_KEYS.filter(k=>parseInt(sd.form?.[k]||0)>0&&!(sd.form?.qixies?.[k]||[]).length)
      .map(k=>TRIGGER_LABELS[k]);
  }
  function sf(key){return filled.reduce((a,s)=>a+parseFloat(data[s]?.form?.[key]||0),0);}

  return(
    <>
      {/* 狀態卡 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"已完整回報",n:filled.filter(s=>!missingQixie(data[s]).length).length,bg:C.green,lt:C.greenLight,bd:C.greenBorder},
          {label:"⚠️ 缺請益明細",n:filled.filter(s=>missingQixie(data[s]).length>0).length,bg:C.amber,lt:C.amberLight,bd:C.amberBorder},
          {label:"⏳ 未回報",n:pending.length,bg:"#6B7280",lt:"#F9FAFB",bd:C.border},
        ].map(({label,n,bg,lt,bd})=>(
          <div key={label} style={{background:lt,border:`2px solid ${bd}`,borderRadius:10,
            padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:C.shadow}}>
            <div style={{fontSize:34,fontWeight:900,color:bg,lineHeight:1}}>{n}</div>
            <div style={{fontSize:12,fontWeight:700,color:bg}}>{label}<br/><span style={{opacity:.6,fontSize:10}}>/ 9 家</span></div>
          </div>
        ))}
      </div>

      {pending.length>0&&(
        <div style={{background:"#F9FAFB",border:`1.5px solid ${C.border}`,borderRadius:8,
          padding:"10px 16px",marginBottom:14}}>
          <span style={{fontSize:12,color:C.textDim,fontWeight:600}}>⏳ 未回報：</span>
          {pending.map(s=>(
            <span key={s} style={{display:"inline-block",background:C.line,borderRadius:20,
              padding:"2px 10px",fontSize:12,fontWeight:700,color:C.textSub,margin:"2px 4px"}}>
              台北{s}
            </span>
          ))}
        </div>
      )}

      {/* 主彙整表 */}
      <div style={{background:C.card,borderRadius:10,border:`1.5px solid ${C.border}`,
        overflow:"hidden",boxShadow:C.shadow,marginBottom:20}}>
        <div style={{background:C.navy,padding:"10px 18px",color:C.goldBorder,fontWeight:900,fontSize:14,letterSpacing:1}}>
          ■ {date} 各店業績彙整
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr>
                <th style={thSt("left",110)}>門市</th>
                <th style={{...thSt("center",60),"background":"#F0FDF4","color":"#065F46"}}>A999</th>
                <th style={{...thSt("center",60),"background":"#F0FDF4","color":"#065F46"}}>A1399</th>
                <th style={thSt("center",55)}>R999</th>
                <th style={{...thSt("center",60),"background":"#FEF2F2","color":"#7F1D1D"}}>R1399</th>
                <th style={{...thSt("center",60),"background":"#F5F3FF","color":"#4C1D95"}}>升轉</th>
                <th style={{...thSt("center",60),"background":"#FEF2F2","color":"#7F1D1D"}}>降轉</th>
                <th style={thSt("center",55)}>設備</th>
                <th style={thSt("center",55)}>門號</th>
                <th style={thSt("center",55)}>設佔%</th>
                <th style={thSt("center",50)}>保險</th>
                <th style={thSt("center",55)}>搭售%</th>
                <th style={thSt("center",50)}>特維</th>
                <th style={thSt("center",50)}>OTT</th>
                <th style={{...thSt("center",65),"background":"#EFF9FF","color":"#0369a1"}}>配件$</th>
                <th style={{...thSt("center",65),"background":"#EFF9FF","color":"#0369a1"}}>包膜$</th>
                <th style={{...thSt("center",55),"background":"#EFF9FF","color":"#0369a1"}}>重點SD</th>
                <th style={thSt("center",100)}>狀態</th>
              </tr>
            </thead>
            <tbody>
              {STORES.map((s,i)=>{
                const d=data[s];const f=d?.form;
                const dT=(parseInt(f?.device||0)+parseInt(f?.line||0))||0;
                const dR=dT?Math.round(parseInt(f?.device||0)/dT*100):0;
                const iR=parseInt(f?.phone_sales||0)?Math.round(parseInt(f?.insurance||0)/parseInt(f.phone_sales)*100):0;
                const ott=(parseInt(f?.ott_video||0)+parseInt(f?.ott_apple||0)+parseInt(f?.ott_hbo||0)+parseInt(f?.ott_nf||0));
                const mq=missingQixie(d);
                const upN=parseInt(f?.upgrade||0);
                const dnN=parseInt(f?.downgrade||0);
                const rb=i%2===0?"#fff":"#FAFBFD";
                return(
                  <tr key={s} style={{background:rb,borderBottom:`1px solid ${C.line}`}}>
                    <td style={{padding:"8px 14px",fontWeight:700,color:C.navy,whiteSpace:"nowrap"}}>
                      台北{s}
                      {d?.submittedAt&&<span style={{fontSize:9,color:C.textDim,marginLeft:5}}>{d.submittedAt}</span>}
                      {d?.form?.phase&&(
                        <span style={{
                          marginLeft:5,fontSize:9,fontWeight:700,
                          color:d.form.phase==="p2"?"#7c3aed":"#0369a1",
                          background:d.form.phase==="p2"?"#F5F3FF":"#EFF9FF",
                          borderRadius:8,padding:"1px 5px"}}>
                          {d.form.phase==="p2"?"第二階段":"第一階段"}
                        </span>
                      )}
                    </td>
                    {d?<>
                      <AnimCell val={f?.aq999||0} bg={parseInt(f?.aq999||0)>0?"#F0FDF4":""}/>
                      <AnimCell val={f?.aq1399||0} bg={parseInt(f?.aq1399||0)>0?"#F0FDF4":""}/>
                      <AnimCell val={f?.r999||0}/>
                      <AnimCell val={f?.r1399||0} bg={parseInt(f?.r1399||0)>0?"#FEF2F2":""} color={parseInt(f?.r1399||0)>0?"#7F1D1D":""}/>
                      {/* 升轉 */}
                      <td style={{textAlign:"center",padding:"6px 8px",background:"#F5F3FF"}}>
                        <span style={{fontWeight:700,color:upN>=2?C.green:C.textSub,fontSize:13}}>
                          {upN>=2?"👍 ":""}{upN}
                        </span>
                      </td>
                      {/* 降轉 */}
                      <td style={{textAlign:"center",padding:"6px 8px",background:dnN>=2?"#FEF2F2":""}}>
                        <span style={{fontWeight:700,color:dnN>=2?C.red:C.textSub,fontSize:13}}>
                          {dnN>=2?"⚠️ ":""}{dnN}
                        </span>
                      </td>
                      <AnimCell val={f?.device||0}/>
                      <AnimCell val={f?.line||0}/>
                      <td style={{textAlign:"center",padding:"6px 8px"}}>
                        <span style={{fontWeight:700,color:dR>=50?C.green:C.red,fontSize:12}}>{dT?`${dR}%`:"—"}</span>
                      </td>
                      <AnimCell val={f?.insurance||0}/>
                      <td style={{textAlign:"center",padding:"6px 8px"}}>
                        <span style={{fontWeight:700,color:iR>=50?C.green:C.red,fontSize:12}}>{parseInt(f?.phone_sales||0)?`${iR}%`:"—"}</span>
                      </td>
                      <AnimCell val={f?.tewei||0}/>
                      <AnimCell val={ott}/>
                      {/* 配件 */}
                      <td style={{textAlign:"center",padding:"6px 8px",background:"#EFF9FF"}}>
                        {(()=>{const v=parseInt(f?.acc||0);const t=TARGETS[s]?.acc||0;const hit=t&&v>=t;
                          return v?<span style={{fontWeight:700,fontSize:12,color:hit?C.green:"#0369a1"}}>{hit?"✅ ":""}{v.toLocaleString()}</span>:<span style={{color:C.textDim}}>—</span>;})()}
                      </td>
                      {/* 包膜 */}
                      <td style={{textAlign:"center",padding:"6px 8px",background:"#EFF9FF"}}>
                        {(()=>{const v=parseInt(f?.coating||0);const t=TARGETS[s]?.coating||0;const hit=t&&v>=t;
                          return v?<span style={{fontWeight:700,fontSize:12,color:hit?C.green:"#0369a1"}}>{hit?"✅ ":""}{v.toLocaleString()}</span>:<span style={{color:C.textDim}}>—</span>;})()}
                      </td>
                      {/* 重點SD */}
                      <td style={{textAlign:"center",padding:"6px 8px",background:"#EFF9FF"}}>
                        {(()=>{const v=parseInt(f?.sd||0);const t=TARGETS[s]?.sd||0;const hit=t&&v>=t;
                          return v?<span style={{fontWeight:700,fontSize:12,color:hit?C.green:"#0369a1"}}>{hit?"✅ ":""}{v}</span>:<span style={{color:C.textDim}}>—</span>;})()}
                      </td>
                      <td style={{textAlign:"center",padding:"6px 8px"}}>
                        {mq.length>0
                          ?<span style={{background:C.amberLight,border:`1.5px solid ${C.amberBorder}`,
                              borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,color:"#7c2d12"}}>
                              ⚠️ 缺{mq.join("、")}</span>
                          :<span style={{background:C.greenLight,border:`1.5px solid ${C.greenBorder}`,
                              borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,color:C.green}}>✅ 完成</span>}
                      </td>
                    </>:<>
                      {Array(16).fill(0).map((_,j)=>(
                        <td key={j} style={{textAlign:"center",padding:"8px 8px",color:C.textDim}}>—</td>
                      ))}
                      <td style={{textAlign:"center",padding:"6px 8px"}}>
                        <span style={{background:"#F3F4F6",borderRadius:20,padding:"2px 8px",
                          fontSize:10,fontWeight:700,color:"#6B7280"}}>未回報</span>
                      </td>
                    </>}
                  </tr>
                );
              })}
              {/* 合計 */}
              <tr style={{background:C.goldLight,borderTop:`2px solid ${C.goldBorder}`,fontWeight:900}}>
                <td style={{padding:"8px 14px",color:C.gold,fontWeight:900,letterSpacing:1,fontSize:12}}>合計</td>
                {["aq999","aq1399","r999","r1399"].map(k=>(
                  <td key={k} style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>{sf(k)||0}</td>
                ))}
                {/* 升轉合計 */}
                <td style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>{sf("upgrade")||0}</td>
                {/* 降轉合計 */}
                <td style={{textAlign:"center",padding:"8px 8px",color:sf("downgrade")>=2?C.red:C.navy,fontWeight:900,fontSize:13}}>{sf("downgrade")||0}</td>
                {["device","line"].map(k=>(
                  <td key={k} style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>{sf(k)||0}</td>
                ))}
                <td style={{textAlign:"center",padding:"8px 8px",color:C.textDim}}>—</td>
                <td style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>{sf("insurance")||0}</td>
                <td style={{textAlign:"center",padding:"8px 8px",color:C.textDim}}>—</td>
                <td style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>{sf("tewei")||0}</td>
                <td style={{textAlign:"center",padding:"8px 8px",color:C.navy,fontWeight:900,fontSize:13}}>
                  {["ott_video","ott_apple","ott_hbo","ott_nf"].reduce((a,k)=>a+sf(k),0)}
                </td>
                <td style={{textAlign:"center",padding:"8px 8px",background:"#EFF9FF",color:"#0369a1",fontWeight:900,fontSize:12}}>{sf("acc")?`$${parseInt(sf("acc")).toLocaleString()}`:"—"}</td>
                <td style={{textAlign:"center",padding:"8px 8px",background:"#EFF9FF",color:"#0369a1",fontWeight:900,fontSize:12}}>{sf("coating")?`$${parseInt(sf("coating")).toLocaleString()}`:"—"}</td>
                <td style={{textAlign:"center",padding:"8px 8px",background:"#EFF9FF",color:"#0369a1",fontWeight:900,fontSize:13}}>{sf("sd")||0}</td>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* 降轉警示清單 */}
      {(()=>{
        const warns=STORES.filter(s=>parseInt(data[s]?.form?.downgrade||0)>=2);
        if(!warns.length) return null;
        return(
          <div style={{background:C.redLight,border:`2px solid ${C.redBorder}`,borderRadius:10,
            padding:"12px 18px",marginBottom:16}}>
            <div style={{fontWeight:900,color:C.red,fontSize:13,marginBottom:8}}>⚠️ 降轉偏高門市（≥2件）— 請關注</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {warns.map(s=>(
                <span key={s} style={{background:"#fff",border:`1.5px solid ${C.redBorder}`,
                  borderRadius:20,padding:"4px 14px",fontSize:13,fontWeight:700,color:C.red}}>
                  台北{s}：{data[s].form.downgrade}件
                </span>
              ))}
            </div>
          </div>
        );
      })()}

      {/* 請益明細彙整 */}
      {TRIGGER_KEYS.map(tk=>{
        const rows=[];
        STORES.forEach(s=>{
          (data[s]?.form?.qixies?.[tk]||[]).forEach((item,idx)=>rows.push({store:s,idx,...item}));
        });
        if(!rows.length) return null;
        const col=tk==="r1399"?"#8a1a00":"#0f5c3a";
        const colLight=tk==="r1399"?"#FFF0EE":"#F0FDF4";
        return(
          <div key={tk} style={{background:C.card,borderRadius:10,border:`1.5px solid ${C.border}`,
            overflow:"hidden",marginBottom:16,boxShadow:C.shadow}}>
            <div style={{background:col,padding:"10px 18px",color:"#fff",fontWeight:900,fontSize:14,letterSpacing:1}}>
              ■ {TRIGGER_LABELS[tk]} 請益明細（{rows.length} 筆）
            </div>
            <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
              {rows.map((r,i)=>(
                <div key={i} style={{border:`1.5px solid ${col}40`,borderRadius:8,overflow:"hidden"}}>
                  {/* 卡片頂列 */}
                  <div style={{background:colLight,padding:"8px 14px",
                    display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",
                    borderBottom:`1px solid ${col}30`}}>
                    <span style={{fontWeight:900,color:col,fontSize:13}}>#{i+1}</span>
                    <span style={{fontWeight:900,color:C.navy,fontSize:14}}>台北{r.store}</span>
                    {r.handler&&<span style={{background:col,color:"#fff",borderRadius:4,padding:"1px 8px",fontSize:12,fontWeight:700}}>{r.handler}</span>}
                    {r.changeType&&<span style={{background:"#E0E7FF",color:"#3730A3",borderRadius:4,padding:"1px 8px",fontSize:12,fontWeight:700}}>{r.changeType}</span>}
                    {r.plan&&<span style={{background:"#FEF3C7",color:"#92400E",borderRadius:4,padding:"1px 8px",fontSize:12,fontWeight:700}}>📶 {r.plan}</span>}
                    {r.dealPrice&&<span style={{background:C.redLight,color:C.red,borderRadius:4,padding:"1px 8px",fontSize:12,fontWeight:900}}>💰 {r.dealPrice}</span>}
                  </div>
                  {/* 卡片內容 */}
                  <div style={{padding:"10px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
                    {r.situation&&(
                      <div style={{gridColumn:"1/-1"}}>
                        <div style={{fontSize:10,color:C.textDim,fontWeight:700,marginBottom:2}}>🏪 進店情境</div>
                        <div style={{fontSize:13,color:C.textMain,lineHeight:1.6,background:"#F8FAFC",borderRadius:6,padding:"6px 10px"}}>{r.situation}</div>
                      </div>
                    )}
                    {r.product&&(
                      <div style={{gridColumn:"1/-1"}}>
                        <div style={{fontSize:10,color:C.textDim,fontWeight:700,marginBottom:2}}>📦 成交商品</div>
                        <div style={{fontSize:13,color:C.textMain,fontWeight:600,background:"#F8FAFC",borderRadius:6,padding:"6px 10px"}}>{r.product}</div>
                      </div>
                    )}
                    {/* 成交分析四格 */}
                    {[
                      {lbl:"🧊 破冰方式",val:r.iceBreak},
                      {lbl:"🎯 切入點",val:r.entry},
                      {lbl:"⚡ 締結點",val:r.closing},
                      {lbl:"✅ 做對的事",val:r.rightThings},
                    ].filter(x=>x.val).map(({lbl,val})=>(
                      <div key={lbl}>
                        <div style={{fontSize:10,color:C.textDim,fontWeight:700,marginBottom:2}}>{lbl}</div>
                        <div style={{fontSize:12,color:C.textMain,lineHeight:1.6,background:"#F8FAFC",
                          borderRadius:6,padding:"6px 8px",minHeight:36}}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </>
  );
}

// ─────────────────────────────────────────
const devT=0; // placeholder，實際在 App 內計算
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
